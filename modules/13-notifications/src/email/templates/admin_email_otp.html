<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{_t_page_title}}</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:40px 0">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #e8e8e8">
<!-- Header — white, editorial wordmark -->
<tr><td style="background:#ffffff;padding:24px 40px;border-bottom:1px solid #e8e8e8">
  <p style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:18px;font-weight:400;color:#1a1a1a;letter-spacing:-0.01em">{{_t_brand_wordmark}}</p>
</td></tr>
<!-- Body -->
<tr><td style="padding:40px">
  <p style="margin:0 0 16px;font-family:Georgia,'Times New Roman',serif;font-size:22px;font-weight:400;color:#1a1a1a;letter-spacing:-0.01em">{{_t_heading}}</p>
  <!-- i18n: body copy not yet externalized -->
  <p style="margin:0 0 24px;font-size:15px;color:#1a1a1a;line-height:1.6">
    Your AssessIQ sign-in code is:
  </p>
  <!-- OTP code display — large, prominent, monospace -->
  <p style="margin:0 0 24px;font-family:'Courier New',Courier,monospace;font-size:36px;font-weight:700;color:#1a1a1a;letter-spacing:0.15em;text-align:center">{{code}}</p>
  <p style="margin:0 0 24px;font-size:13px;color:#5f6368;line-height:1.6">
    This code expires in <strong style="color:#1a1a1a">{{expires_minutes}} minutes</strong>.
  </p>
  <p style="margin:0;font-size:13px;color:#5f6368;line-height:1.6">
    If you did not request this code, you can ignore this email. No action is needed.
  </p>
</td></tr>
<!-- Footer -->
<tr><td style="background:#f5f5f5;padding:20px 40px;border-top:1px solid #e8e8e8">
  <!-- i18n: footer copy not yet externalized -->
  <p style="margin:0;font-size:11px;color:#9aa0a6;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif">
    &copy; AssessIQ &middot; All rights reserved.
  </p>
</td></tr>
</table>
</td></tr>
</table>
</body>
</html>
