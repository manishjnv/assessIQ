<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Attempt ready for review</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:system-ui,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;padding:40px 0">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden">
<tr><td style="background:#1a1a2e;padding:32px 40px">
  <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:700">AssessIQ</h1>
</td></tr>
<tr><td style="padding:40px">
  <h2 style="margin:0 0 16px;color:#111;font-size:20px">Attempt ready for review</h2>
  <p style="margin:0 0 16px;color:#444;line-height:1.6">
    An attempt by <strong>{{candidateName}}</strong> on
    <strong>&#34;{{assessmentName}}&#34;</strong> (<strong>{{tenantName}}</strong>)
    is ready for human review.
  </p>
  <p style="margin:0 0 8px;color:#888;font-size:13px">
    Attempt ID: <code>{{attemptId}}</code>
  </p>
  <a href="{{reviewLink}}"
     style="display:inline-block;margin-top:24px;background:#4f46e5;color:#ffffff;padding:14px 28px;border-radius:6px;text-decoration:none;font-weight:600;font-size:15px">
    Review Attempt
  </a>
</td></tr>
<tr><td style="background:#f4f4f5;padding:24px 40px;border-top:1px solid #e5e7eb">
  <p style="margin:0;color:#9ca3af;font-size:12px">
    &copy; AssessIQ. All rights reserved.
  </p>
</td></tr>
</table>
</td></tr>
</table>
</body>
</html>
