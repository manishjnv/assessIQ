<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- i18n: page title not yet externalized -->
<title>Weekly digest</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:40px 0">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #e8e8e8">
<!-- Header — white, editorial wordmark + week label -->
<tr><td style="background:#ffffff;padding:24px 40px;border-bottom:1px solid #e8e8e8">
  <!-- i18n: brand wordmark (fixed string, not yet externalized) -->
  <p style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:18px;font-weight:400;color:#1a1a1a;letter-spacing:-0.01em">AssessIQ</p>
  <!-- Week label — mono microcopy per brand guidelines -->
  <!-- i18n: digest label not yet externalized -->
  <p style="margin:4px 0 0;font-size:11px;font-family:'Courier New',Courier,'Lucida Console',monospace;color:#9aa0a6;letter-spacing:0.06em;text-transform:uppercase">
    WEEKLY DIGEST &middot; {{weekEnding}}
  </p>
</td></tr>
<!-- Body -->
<tr><td style="padding:40px">
  <!-- i18n: tenant heading not yet externalized -->
  <p style="margin:0 0 24px;font-family:Georgia,'Times New Roman',serif;font-size:22px;font-weight:400;color:#1a1a1a;letter-spacing:-0.01em">{{tenantName}}</p>
  <!-- Stats table -->
  <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #e8e8e8;border-radius:10px;overflow:hidden">
  <!-- Table header row — mono uppercase per brand microcopy guidelines -->
  <tr style="background:#fafafa">
    <!-- i18n: table headers not yet externalized -->
    <td style="padding:10px 16px;font-size:11px;font-family:'Courier New',Courier,'Lucida Console',monospace;color:#9aa0a6;letter-spacing:0.06em;text-transform:uppercase;border-bottom:1px solid #e8e8e8">METRIC</td>
    <td align="right" style="padding:10px 16px;font-size:11px;font-family:'Courier New',Courier,'Lucida Console',monospace;color:#9aa0a6;letter-spacing:0.06em;text-transform:uppercase;border-bottom:1px solid #e8e8e8">COUNT</td>
  </tr>
  <!-- Row 1: Total attempts -->
  <tr>
    <!-- i18n: row labels not yet externalized -->
    <td style="padding:12px 16px;font-size:14px;color:#5f6368;border-bottom:1px solid #e8e8e8">Total attempts</td>
    <td align="right" style="padding:12px 16px;font-size:14px;font-family:Georgia,'Times New Roman',serif;color:#1a1a1a;border-bottom:1px solid #e8e8e8">{{totalAttempts}}</td>
  </tr>
  <!-- Row 2: Completed -->
  <tr style="background:#fafafa">
    <td style="padding:12px 16px;font-size:14px;color:#5f6368;border-bottom:1px solid #e8e8e8">Completed</td>
    <td align="right" style="padding:12px 16px;font-size:14px;font-family:Georgia,'Times New Roman',serif;color:#1a1a1a;border-bottom:1px solid #e8e8e8">{{completedAttempts}}</td>
  </tr>
  <!-- Row 3: Graded this week -->
  <tr>
    <td style="padding:12px 16px;font-size:14px;color:#5f6368;border-bottom:1px solid #e8e8e8">Graded this week</td>
    <td align="right" style="padding:12px 16px;font-size:14px;font-family:Georgia,'Times New Roman',serif;color:#1a1a1a;border-bottom:1px solid #e8e8e8">{{gradedThisWeek}}</td>
  </tr>
  <!-- Row 4: Pending review — danger color #e64242 = oklch(0.62 0.20 25) -->
  <tr style="background:#fafafa">
    <td style="padding:12px 16px;font-size:14px;color:#5f6368">Pending review</td>
    <td align="right" style="padding:12px 16px;font-size:14px;font-family:Georgia,'Times New Roman',serif;color:#e64242">{{pendingReview}}</td>
  </tr>
  </table>
  <!-- CTA — pill button, brand accent #1a73e8 = oklch(0.58 0.17 258) -->
  <!-- i18n: CTA label not yet externalized -->
  <a href="{{dashboardLink}}"
     style="display:inline-block;margin-top:32px;background:#1a73e8;color:#ffffff;padding:12px 28px;border-radius:999px;text-decoration:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;font-weight:500;letter-spacing:-0.005em">
    View dashboard
  </a>
</td></tr>
<!-- Footer -->
<tr><td style="background:#f5f5f5;padding:20px 40px;border-top:1px solid #e8e8e8">
  <!-- i18n: footer copy not yet externalized -->
  <p style="margin:0;font-size:11px;color:#9aa0a6;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif">
    &copy; AssessIQ &middot; All rights reserved.
  </p>
</td></tr>
</table>
</td></tr>
</table>
</body>
</html>
