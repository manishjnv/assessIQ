<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weekly digest</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:system-ui,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;padding:40px 0">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden">
<tr><td style="background:#1a1a2e;padding:32px 40px">
  <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:700">AssessIQ</h1>
  <p style="margin:8px 0 0;color:#a5b4fc;font-size:14px">
    Weekly digest — week ending {{weekEnding}}
  </p>
</td></tr>
<tr><td style="padding:40px">
  <h2 style="margin:0 0 24px;color:#111;font-size:20px">
    Summary for {{tenantName}}
  </h2>
  <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #e5e7eb;border-radius:6px;overflow:hidden">
  <tr style="background:#f9fafb">
    <td style="padding:12px 16px;color:#6b7280;font-size:13px;font-weight:600;border-bottom:1px solid #e5e7eb">METRIC</td>
    <td style="padding:12px 16px;color:#6b7280;font-size:13px;font-weight:600;border-bottom:1px solid #e5e7eb" align="right">COUNT</td>
  </tr>
  <tr>
    <td style="padding:12px 16px;color:#374151;border-bottom:1px solid #e5e7eb">Total attempts</td>
    <td style="padding:12px 16px;color:#111;font-weight:600;border-bottom:1px solid #e5e7eb" align="right">{{totalAttempts}}</td>
  </tr>
  <tr style="background:#f9fafb">
    <td style="padding:12px 16px;color:#374151;border-bottom:1px solid #e5e7eb">Completed attempts</td>
    <td style="padding:12px 16px;color:#111;font-weight:600;border-bottom:1px solid #e5e7eb" align="right">{{completedAttempts}}</td>
  </tr>
  <tr>
    <td style="padding:12px 16px;color:#374151;border-bottom:1px solid #e5e7eb">Graded this week</td>
    <td style="padding:12px 16px;color:#111;font-weight:600;border-bottom:1px solid #e5e7eb" align="right">{{gradedThisWeek}}</td>
  </tr>
  <tr style="background:#f9fafb">
    <td style="padding:12px 16px;color:#374151">Pending review</td>
    <td style="padding:12px 16px;color:#ef4444;font-weight:600" align="right">{{pendingReview}}</td>
  </tr>
  </table>
  <a href="{{dashboardLink}}"
     style="display:inline-block;margin-top:32px;background:#4f46e5;color:#ffffff;padding:14px 28px;border-radius:6px;text-decoration:none;font-weight:600;font-size:15px">
    View Dashboard
  </a>
</td></tr>
<tr><td style="background:#f4f4f5;padding:24px 40px;border-top:1px solid #e5e7eb">
  <p style="margin:0;color:#9ca3af;font-size:12px">
    &copy; AssessIQ. All rights reserved.
  </p>
</td></tr>
</table>
</td></tr>
</table>
</body>
</html>
