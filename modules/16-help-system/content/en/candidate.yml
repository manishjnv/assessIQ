# AssessIQ help content — candidate audience, en locale.
# Edit this file, then run:  pnpm tsx tools/generate-help-seed.ts
# to regenerate modules/16-help-system/migrations/0011_seed_help_content.sql.

# ─── Pre-attempt intro ───

candidate.intro.integrity:
  audience: candidate
  short_text: "AssessIQ measures judgment and reasoning, not memory. Use any reference you would in a real workday."
  long_md: |
    ## Integrity expectations

    This assessment is not a closed-book exam. AssessIQ is built to measure
    how you think on the job, not what you can recall under pressure. Use:

    - **Documentation** for the tools and languages you would normally
      reference at work.
    - **Search engines** to look up syntax or operators.
    - **Notes** you would normally have open.

    Do **not** ask another person to answer for you, share screens, or paste
    answers from another candidate's attempt. AssessIQ records timing
    signals, edit patterns, and behavioral fingerprints; identical or
    near-identical answers across candidates are flagged for review.

    Once you click **Begin Assessment**, the timer starts and cannot be
    paused. If your network drops, your answers are saved every 5 seconds —
    you can refresh and continue.

# ─── During the attempt ───

candidate.attempt.timer:
  audience: candidate
  short_text: "Wall-clock time remaining. Auto-submits at zero. Pausing is not supported."
  long_md: |
    ## Timer

    The countdown shows time remaining for the entire assessment, not the
    current question. When it reaches zero, AssessIQ auto-submits whatever
    answers you have entered.

    **The timer keeps running even if you close the tab.** Network dropouts
    do not pause it. If you genuinely cannot continue (power outage,
    medical emergency), close the tab and contact your administrator
    immediately — they can grant a one-time extension before submission.

    Behavioral signals recorded by AssessIQ include time spent per question,
    number of edits, and navigation pattern. None of these signals affect
    your score directly; they inform the admin's review.

candidate.attempt.flag:
  audience: candidate
  short_text: "Bookmark the question to revisit before final submit. Flags have no scoring impact."
  long_md: |
    ## Flag for review

    Use this when you want to come back to a question before final submission —
    for instance, if you are not sure of your answer or want to verify a query.

    Flagged questions appear with a star in the navigation panel. You can flag
    multiple questions; the **Review** screen lists all flagged + unanswered
    items together so you do not miss anything.

    Flagging has no scoring impact. It is just a personal bookmark.

candidate.attempt.kql.editor:
  audience: candidate
  short_text: "Write your KQL query. Syntax highlighting + autocomplete. Press Ctrl+Enter to validate."
  long_md: |
    ## KQL editor

    The editor offers:

    - **Syntax highlighting** for KQL keywords, operators, and built-in
      functions.
    - **Autocomplete** for table names referenced in the question scenario.
    - **Bracket / paren matching** to spot mismatches early.
    - **Format on save** (Ctrl+Shift+F) — opinionated, optional.

    **Validation** (Ctrl+Enter) checks for:

    - Parse errors (red underline).
    - Required keyword presence — the question lists tokens that must appear
      somewhere in your query for it to score above band 0.

    Validation does not run your query against real data. The grader judges
    correctness by combining keyword presence with AI rubric review.

candidate.attempt.scenario.steps:
  audience: candidate
  short_text: "Multi-step incident. Some steps may unlock only after submitting earlier steps."
  long_md: |
    ## Scenario steps

    Scenario questions describe a developing incident across multiple steps.
    Each step asks for a decision or analysis given the evidence so far.

    **Two modes:**

    - **Free navigation** (default): jump between steps freely. You may
      revise earlier steps as later evidence arrives.
    - **Locked progression**: each step unlocks only after you submit the
      previous one. Look for a small lock icon on later steps.

    Once you submit a step in locked mode, you cannot edit it. In free mode
    every step stays editable until you submit the assessment.

    Behavioral note: AssessIQ records the order you visited the steps. There
    is no "correct" order — exploring later evidence first is a valid
    strategy.

candidate.attempt.subjective.length:
  audience: candidate
  short_text: "Recommended 80–200 words per answer. Quality of reasoning beats word count."
  long_md: |
    ## Subjective answer length

    Subjective questions are graded on the rubric (anchors and bands), not on
    length. A 60-word answer that nails the tradeoff scores higher than a
    300-word answer that meanders.

    **Rough guide:**

    - **Below 40 words:** rarely enough to demonstrate reasoning.
    - **80–200 words:** the sweet spot for most rubrics.
    - **Above 300 words:** law of diminishing returns; you are using time
      that other questions need.

    Markdown formatting (bullets, **bold**, `code`) renders in the grader's
    review. Use it when it clarifies; do not use it as filler.

candidate.attempt.disconnect:
  audience: candidate
  short_text: "Your answers autosave every 5 seconds. Refresh and continue — the timer keeps running."
  long_md: |
    ## If your connection drops

    AssessIQ saves your in-progress answers to the server every 5 seconds and
    shows a small green check next to "Saved" when the latest save completed.
    A red dot means the last save attempt failed; AssessIQ will retry on the
    next interval.

    **If you lose connectivity:**

    1. **The timer keeps running** — wall-clock time, not connected time.
    2. **Reconnect and refresh** — your most recent autosaved state loads.
    3. **Anything typed during the offline window is lost** — only saved
       state survives a refresh.

    For a genuinely-blocking outage (power, hardware failure), close the tab
    and contact your administrator. They can grant a one-time extension
    before final submission, but cannot extend after auto-submit fires.

candidate.attempt.submit.confirm:
  audience: candidate
  short_text: "Once submitted, you cannot reopen the attempt. Verify your flagged questions first."
  long_md: |
    ## Submitting your attempt

    Submission is **final**. AssessIQ does not allow editing answers after
    submit, and there is no second attempt unless your administrator
    explicitly grants one.

    Before clicking the final **Submit** button, the **Review** screen shows:

    - Flagged questions you wanted to revisit.
    - Unanswered questions (a blank textarea or empty MCQ counts).
    - Questions whose autosave is stale (rare — usually only seconds old).

    Walk through any starred or unanswered items. When you are ready, click
    **Submit**. AssessIQ confirms submission with a final dialog and the
    candidate timer freezes immediately.

# ─── Final-submit dialog & results ───

candidate.submit.confirm:
  audience: candidate
  short_text: "Final confirmation — clicking Submit ends the attempt and starts the grading queue."
  long_md: |
    ## Final submit dialog

    This dialog is the last step. Once you confirm, AssessIQ:

    1. Freezes your answers and the timer.
    2. Records all behavioral signals.
    3. Queues the attempt for grading.
    4. Emails your administrator that the attempt is ready for review.

    **You will not see your score immediately.** AI grading runs synchronously
    when an admin opens your attempt for review (Phase 1). Your administrator
    will email you once the score is released; depending on their workflow,
    that can be the same day or several days later.

    There is no "save and continue later" option from this dialog — once you
    are here, you have committed to submitting.

candidate.result.bands:
  audience: candidate
  short_text: "Bands 0/25/50/75/100 represent your performance vs the rubric, not a raw percentage."
  long_md: |
    ## Understanding your score

    AssessIQ does not report raw percentages for subjective and scenario
    questions. Instead, every answer lands on a **band**:

    | Band | Meaning |
    |---|---|
    | **0** | Missing, off-topic, or fundamentally incorrect |
    | **25** | Touched the right area but missed the key point |
    | **50** | Partial credit — covered some of the rubric, missed the rest |
    | **75** | Substantially correct, with one notable gap |
    | **100** | Complete and well-reasoned per the rubric anchors |

    **Why bands and not percentages?** Subjective work is not millimetric.
    Two graders comparing "73% vs 76%" learn nothing useful; comparing band
    50 vs band 75 forces a clear judgement call. AssessIQ surfaces the AI's
    band, the AI's justification, and any admin override side-by-side — so
    your record is transparent end-to-end.

    MCQ and KQL questions also map to bands so the final score has a
    consistent shape.

# ─── Certificates ───

candidate.cert.share-linkedin:
  audience: candidate
  short_text: "Click Share on LinkedIn to post your certificate. Each share is counted in My Certificates."
  long_md: |
    ## Share Your Certificate on LinkedIn

    When you earn a certificate, click **Share on LinkedIn** to post it to your
    LinkedIn profile. A counter records each share so you can track your
    engagement in My Certificates.

candidate.cert.completion-modal:
  audience: candidate
  short_text: "A congratulations pop-up appears once per certificate tier the first time you view each earned certificate."
  long_md: |
    ## Completion Celebration

    After a graded result is released, My Certificates may show a congratulations
    pop-up the first time you view each certificate. The pop-up appears once per
    certificate tier; if you earn a higher tier later, it will appear again.

public.verify.share_linkedin:
  audience: candidate
  short_text: "Share this verified credential to your LinkedIn network in one click."
  long_md: |
    ## Share on LinkedIn

    Opens LinkedIn's share dialog with this certificate's public verification
    link pre-filled. LinkedIn fetches the page and displays a rich preview card
    showing your name and course title.

    Only **active** (non-revoked) certificates can be shared. If this
    certificate has been revoked, the button is disabled.

candidate.profile.name-callout:
  audience: candidate
  short_text: "Certificates print the name from your profile at issuance. Keep your profile name current before completing an assessment."
  long_md: |
    ## Your Name on Certificates

    The name printed on your certificates is taken from your profile at the time
    of issuance. To make sure your certificates show the correct name, keep your
    profile name up to date before completing an assessment.

# ─── Sign-in (magic-link) ───

candidate.auth.request-link:
  audience: candidate
  short_text: "Enter the email address your administrator used to register you. We will email you a sign-in link — no password needed."
  long_md: |
    ## Sign in with a magic link

    Type the email address your administrator registered you with and click
    **Send link**. AssessIQ will email you a one-time sign-in link that is
    valid for 15 minutes.

    You do not need a password. Clicking the link in your email is all it
    takes to sign in and view your certificates.

    **Already signed in?** If you already have an active session you will be
    taken straight to your certificates without needing to request a new link.

candidate.auth.link-sent:
  audience: candidate
  short_text: "Check your inbox — a sign-in link is on its way. It expires in 15 minutes. Didn't get it? Wait a minute and try again."
  long_md: |
    ## Check your email

    A sign-in link has been sent to the address you entered. It will arrive
    within a minute or two depending on your email provider.

    **The link expires in 15 minutes.** If you do not click it in time, come
    back to the sign-in page and request a new one.

    **Did not receive anything?**

    - Check your spam or junk folder.
    - Make sure you entered the exact email address your administrator
      registered you with.
    - Wait at least 60 seconds before requesting another link (too many
      requests in a short window are automatically rate-limited).

    Each link is single-use — clicking it a second time will not work.
    Request a fresh link if you need to sign in again.

candidate.auth.session-status:
  audience: candidate
  short_text: "You are currently signed in. Your session lasts 30 days from when you first clicked your sign-in link."
  long_md: |
    ## Your sign-in session

    You are signed in and your session is active. AssessIQ candidate sessions
    last **30 days** from the moment you clicked your sign-in link — you do
    not need to sign in again during that period.

    The session is tied to this browser. If you switch to a different browser
    or device you will need to request a new sign-in link.

    **To sign out early**, close your browser or clear cookies. Your
    certificates remain available; you just need a fresh link next time.

candidate.auth.expiring-soon:
  audience: candidate
  short_text: "Your session expires in the next 5 days. Request a new sign-in link now to avoid being logged out unexpectedly."
  long_md: |
    ## Your session is expiring soon

    Your 30-day sign-in session will expire within the next 5 days. After it
    expires you will be signed out automatically and will need to request a
    new link to view your certificates again.

    **To renew:** visit the sign-in page, enter your email address, and click
    the link in the email you receive. Your certificates and history are not
    affected — only the session changes.

candidate.activity:
  audience: candidate
  short_text: "Your personal activity dashboard: completions, average score, 52-week heatmap, weekly chart, and your rank on every pack you have attempted."
  long_md: |
    ## My activity

    This page gives you a full picture of your assessment history on this
    tenant.

    ### Stat cards

    - **Assessments completed** — total submissions in the selected period,
      broken down by domain.
    - **Packs attempted** — distinct question packs you have ever submitted
      an attempt for.
    - **Avg. score** — your mean auto-graded score across all completed
      attempts in the period, with a quartile breakdown.

    Use the **This week / This month / This quarter** toggle to adjust the
    stats window. The heatmap and weekly chart always show the full 52-week
    rolling window regardless of the toggle.

    ### Activity streak

    The 52-week heatmap shows one cell per day. Darker cells mean more
    completions on that day. The current streak counts consecutive days with
    at least one submission up to and including today.

    ### Weekly completions

    The stacked bar chart shows how many assessments you submitted each week,
    coloured by domain. Hover a bar to see the exact breakdown.

    ### My pack rankings

    One row per pack you have attempted. Shows your **best score** (the
    highest auto-graded result across all your attempts) and your **rank**
    among every candidate in this tenant who took the same pack. For example
    "#3 of 24" means your best score places you third out of the 24 candidates
    who have submitted that pack.

    Ranks are computed live and update as other candidates submit new attempts.
