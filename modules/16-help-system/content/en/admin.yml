# AssessIQ help content — admin audience, en locale.
# Edit this file, then run:  pnpm tsx tools/generate-help-seed.ts
# to regenerate modules/16-help-system/migrations/0011_seed_help_content.sql.
#
# Per-entry shape:
#   <help_id>:
#     audience: admin | reviewer | candidate | all
#     short_text: ≤120 chars (tooltip / inline)
#     long_md: optional markdown for the drawer
#     related_keys: optional sibling links
#
# Help-id convention: <audience>.<area>.<page>.<element> — see docs/07-help-system.md.

# ─── Admin auth surfaces (retroactive audit, Phase 1 G1.A Session 2) ───

admin.auth.login.tenant_slug:
  audience: admin
  short_text: "Your organization's slug — the unique URL-safe ID we issued during onboarding (e.g. wipro-soc)."
  long_md: |
    ## Tenant slug

    Each AssessIQ tenant has a short, URL-safe identifier you'll use at every
    sign-in. It usually mirrors your team or product name (e.g. `wipro-soc`,
    `acme-secops`). Your AssessIQ administrator received the slug at onboarding;
    if you don't have it, ask them — it is not the same as your email domain.

    The slug is also used in webhook payloads and embed-iframe URLs, so once it
    is set it stays stable. Renaming a tenant is a manual operation that
    requires support.

admin.auth.mfa.enroll_vs_verify:
  audience: admin
  short_text: "First-time admins enroll an authenticator app here; returning admins enter their 6-digit code to sign in."
  long_md: |
    ## TOTP enrollment vs verification

    The first time an admin signs in, AssessIQ shows a QR code and asks you to
    scan it with an authenticator app (Google Authenticator, Authy, 1Password,
    Microsoft Authenticator). After scanning, enter the 6-digit code shown in
    the app to confirm the secret matches.

    Returning admins skip the QR code and only enter the 6-digit code. Codes
    rotate every 30 seconds; AssessIQ accepts the previous, current, and next
    code to absorb small clock drifts.

    Lockout policy: five wrong codes in a row locks the account for 15 minutes.
    Recovery codes are not yet supported in Phase 1 — if you lose access,
    another admin must reset your TOTP enrollment.

admin.users.role:
  audience: admin
  short_text: "admin = full access · reviewer = grade and override only · candidate = take assessments only."
  long_md: |
    ## User roles

    | Role | Can do |
    |---|---|
    | **admin** | Everything: tenant settings, packs, assessments, grading, exports, billing |
    | **reviewer** | Grade and override AI verdicts; view assessment results; cannot edit packs or invite users |
    | **candidate** | Take assigned assessments; view their own past scores |

    Role changes take effect on the next sign-in for that user. Demoting an
    admin to reviewer revokes their fresh-MFA gates immediately. There is no
    "owner" or "billing" role — that is a Phase 2 concern.

# ─── Pack & question authoring ───

admin.packs.create.domain:
  audience: admin
  short_text: "The role-readiness domain this pack covers (SOC analyst, DevOps, etc.). Set once; choose carefully."
  long_md: |
    ## Pack domain

    A *pack* is a collection of leveled questions for a single role-readiness
    domain. The domain is metadata only — AssessIQ has no domain-specific
    code paths — but it controls the default rubric anchors, the example UI
    copy, and how packs sort in the admin browser.

    Common values: `soc-analyst`, `devops-engineer`, `cloud-architect`,
    `identity-engineer`, `incident-responder`. Use lowercase, dash-separated.

    You cannot rename a pack's domain after questions exist under it — clone
    the pack into a new domain instead.

admin.questions.generate.draft:
  audience: admin
  short_text: "Generate 1–30 AI draft questions from the pack-detail page. Each draft must be reviewed and activated individually."
  long_md: |
    ## AI-assisted question generation

    The **Generate questions** button (pack-detail page → level row) sends
    the pack's knowledge base and rubric anchors to the AI pipeline and
    returns 1–30 `ai_draft` questions per call. Each draft is staged
    for review — generation does not auto-publish or activate any question.

    **Using the generator:**

    1. Open a pack, expand the level you want to fill.
    2. Click **Generate questions**, set the count (1–30), optionally narrow
       the topic focus, then click **Generate**.
    3. New `ai_draft` questions appear in the question list. Open each one
       in the question editor to review anchors and rubric, then activate.

    Wall-clock for a single call:

    - count ≤ 10  → one model call, ~30–90 s per question (cold cache)
    - count 11–20 → two parallel model calls, ~3–4 min total
    - count 21–30 → three parallel model calls, ~3–5 min total

    ### Notes

    - **Cache window:** the prompt context (skill + knowledge-base JSON,
      ~25 K tokens) caches for 5 minutes after a call. A second click within
      5 minutes reuses the cache and is 2–3× faster.
    - **Topic dedupe:** parallel chunks may independently propose the same
      topic. The handler drops case-insensitive duplicates against existing
      pack topics and across chunks before insert.
    - **Review still required:** each `ai_draft` must be opened, reviewed,
      and individually activated — generation does not auto-publish.

admin.questions.import.format:
  audience: admin
  short_text: "JSON only in Phase 1 (CSV is Phase 2). Schema: modules/04-question-bank/import.schema.json."
  long_md: |
    ## Question import format

    Bulk import accepts a single JSON document in this Phase. The document
    schema is published at
    `modules/04-question-bank/import.schema.json`; in summary:

    ```jsonc
    {
      "pack": "soc-analyst-v1",
      "level": "L2",
      "questions": [
        {
          "type": "mcq | kql | scenario | subjective",
          "body": "...",
          "answers": [...],          // shape varies by type
          "rubric": { ... },         // for subjective / scenario
          "tags": ["phishing", "triage"]
        }
      ]
    }
    ```

    CSV import is on the Phase 2 roadmap. Until then, convert spreadsheets to
    JSON with a script of your choice — the schema is plain enough to template.

admin.questions.type.kql.expected_keywords:
  audience: admin
  short_text: "Tokens that MUST appear (case-insensitive) for the answer to score above band 0. Add 1–5 per question."
  long_md: |
    ## KQL expected keywords

    KQL questions are graded on a hybrid: **deterministic keyword presence**
    plus AI judgement on syntactic and semantic correctness. The keyword list
    is the deterministic floor — if none of the listed tokens appear in the
    candidate's query, the answer can score at most band 0 regardless of how
    elegant the rest of the query is.

    **Recommendations:**

    - Pick tokens that are *necessary*, not sufficient: a query that lacks
      `where` or the target table cannot be correct.
    - 1–5 keywords per question. More than 5 makes scoring brittle.
    - Use case-insensitive matching (`Where`, `where`, `WHERE` all match).
    - Quoted identifiers (`"My Table"`) are matched literally; bare tokens
      are matched as whole words (`time` will not match `timestamp`).

    The AI grader sees the keyword list as a hint and uses it to anchor its
    own judgement — admin can still override.

admin.questions.type.scenario.step_dependency:
  audience: admin
  short_text: "Lock a step so it can't be answered until the previous step is submitted. Use sparingly."
  long_md: |
    ## Step dependency

    Scenario questions present a multi-step incident. By default, candidates
    can navigate freely — they may answer step 3 before step 1 if they want
    to think non-linearly. Setting **step dependency** locks each step until
    the previous one is submitted.

    **When to enable:**

    - The branching narrative (we tell the candidate "the alert escalated
      because…") would spoil the answer to an earlier step.
    - You want to measure pure decision speed without back-tracking.

    **When not to:**

    - Standard triage workflows. Real analysts revisit earlier conclusions.
    - Investigation-style scenarios where evidence accumulates.

    The candidate sees a small lock icon on dependent steps and a clear
    "Submit step N to continue" prompt.

admin.questions.type.subjective.rubric:
  audience: admin
  short_text: "Anchors describe each band (0/25/50/75/100). Write band 100 first, then 0, then fill the middle."
  long_md: |
    ## Subjective rubric anchors

    AI grading uses the rubric anchors as the *one* shared truth between the
    AI's judgement and your override. Every grading record stores the anchors
    that were active at grade time, so an audit trail survives even if you
    later refine the rubric.

    **Authoring approach that works:**

    1. Write **band 100** first — what does an obviously correct, complete
       answer look like? Be specific: which terms, structures, or tradeoffs
       must appear.
    2. Write **band 0** second — what is missing, vague, or wrong enough to
       score zero? The AI uses this as the negative anchor.
    3. Fill **band 50** — the middle: partial credit, missing one of two
       required elements, correct intuition with weak rationale.
    4. Fill **band 25** and **band 75** by interpolation.

    **Anti-patterns:**

    - "It depends" or "looks reasonable" — too vague for the AI to ground on.
    - Numeric thresholds the AI can't verify (e.g. "discusses at least three
      mitigations" works; "scores 7/10 on accuracy" doesn't).
    - More than ~80 words per band — the rubric is a contract, not an essay.

    Override the AI verdict any time. Your override sits *beside* the AI's
    record, never replaces it.

# ─── Assessment lifecycle ───

admin.assessments.create.duration:
  audience: admin
  short_text: "Total wall-clock minutes from candidate start to auto-submit. L1: 30–45, L2: 45–60, L3: 60–90."
  long_md: |
    ## Duration

    The total time a candidate has from clicking **Begin Assessment** to the
    auto-submit. Once started, the timer cannot be paused.

    **Recommendations:**

    - **L1 / triage-style:** 30–45 minutes
    - **L2 / investigation:** 45–60 minutes
    - **L3 / detection engineering:** 60–90 minutes

    Candidates can navigate freely between questions during this window.
    Auto-submit fires the moment the timer hits zero — partial answers are
    saved.

    > **Note:** Time-based behavioral signals (per-question time spent, edits)
    > are captured regardless of duration. Do not compress duration to "force
    > speed"; the platform measures speed separately.

  related_keys:
    - admin.assessments.create.question_count

admin.assessments.create.question_count:
  audience: admin
  short_text: "How many questions to draw from the pack/level pool. Must be ≤ active questions in the pool."
  long_md: |
    ## Question count

    AssessIQ samples this many questions from the pack + level you chose. If
    randomization is on, every candidate sees a different draw; if off, all
    candidates see the same set in the same order.

    **Constraints:**

    - Must be ≤ the number of `active` questions in the pool. Publish fails
      if not.
    - Pool size is shown live next to this input as you author.
    - Recommended ratio: ~1 question per 4 minutes of duration. Higher density
      is fine for MCQ-heavy assessments; lower for scenario or subjective
      heavy ones.

admin.assessments.create.randomize:
  audience: admin
  short_text: "Each candidate sees a different sample + order. Off = identical assessment for everyone."
  long_md: |
    ## Randomize question selection

    With randomization on, every candidate's attempt:

    - Draws a fresh sample from the pool (size = question count).
    - Shuffles question order.
    - Shuffles MCQ answer order on a per-question basis.

    The seed is stable per attempt, so refreshing the page does not re-shuffle.

    **When to turn it off:**

    - Calibrating a new pack against a fixed reference set.
    - Live training events where everyone sees the same screen.
    - Anti-cheat is **not** the right reason — randomization is not a
      meaningful integrity control. Use real-time monitoring or proctoring
      tools instead.

admin.assessments.publish:
  audience: admin
  short_text: "Locks the question set, opens invitations, and starts the schedule. Pre-flight checks run automatically."
  long_md: |
    ## Publish assessment

    Publishing flips the assessment from `draft` to `published` and runs three
    pre-flight checks:

    1. **Pool size** — the active question pool ≥ the requested question
       count.
    2. **Open window** — `opens_at` is in the future or already past with a
       valid `closes_at`.
    3. **Notification config** — if invitations are scheduled, the tenant has
       a working SMTP config.

    Once published, the question set is **frozen** for that assessment. Edits
    to questions in the underlying pack do not affect already-published
    assessments — that is by design (HR auditability).

    To change a published assessment, **close** it and create a new one.

admin.assessments.close.early:
  audience: admin
  short_text: "Sends auto-submit to every in-progress attempt. Cannot be undone — closes the schedule immediately."
  long_md: |
    ## Close assessment early

    Forces the assessment from `active` to `closed` immediately, regardless of
    `closes_at`. Effects:

    - Every in-progress attempt is auto-submitted with whatever answers exist.
    - Pending invitations are revoked; their links return a "this assessment
      is closed" page if used.
    - Notifications fire as if the schedule had ended naturally.

    **You cannot reopen** a closed assessment whose `closes_at` has passed.
    Re-opening before `closes_at` is allowed but rare — see
    `assessment.reopen` (admin-only, audited).

    Use this for: an emergency stop (compromised question content, vendor
    incident). Do **not** use this to "give one candidate extra time" — that
    is a per-attempt extension, not an assessment-level action.

admin.assessments.invite.bulk:
  audience: admin
  short_text: "Paste up to 500 emails (one per line). Existing users are linked; new users get a magic-link signup."
  long_md: |
    ## Bulk invite

    Paste up to 500 candidate emails — one per line. AssessIQ:

    1. **De-duplicates** within the input list and against existing
       invitations on this assessment.
    2. **Links existing users** by email. They receive a sign-in invitation
       only.
    3. **Creates pending users** for new emails. They receive a magic-link
       sign-up + assessment invitation in one email.

    **Rate-limited:** 500 emails per hour per tenant per admin. The UI shows
    a progress bar; if you hit the limit, the remaining emails queue and send
    over the next hour automatically.

    **Email content:** uses the tenant's branded template if configured, the
    default template otherwise. Editing templates is an admin-settings page.

  related_keys:
    - admin.assessments.publish

# ─── Analytics & Reports (Phase 3 G3.C) ───

admin.reports.cohort.distribution:
  audience: admin
  short_text: "Archetype distribution shows how many submitted attempts landed in each performance archetype for this assessment."
  long_md: |
    ## Cohort archetype distribution

    AssessIQ classifies each completed attempt into one of five archetypes:

    | Archetype | Meaning |
    |---|---|
    | `confident_correct` | High score with consistent reasoning alignment |
    | `capable_but_unsure` | High score but lower reasoning quality |
    | `memorised_pattern` | Correct answers without analytical depth |
    | `partial_grasp` | Mixed accuracy; some topics understood |
    | `needs_support` | Low score, reasoning gaps across topics |

    The distribution chart reflects **submitted and scored** attempts only.
    In-progress or pending-review attempts are excluded until grading is complete.

    Archetypes are immutable once assigned — reassessing a candidate creates a
    new attempt with its own archetype.

admin.reports.heatmap.colors:
  audience: admin
  short_text: "Heat cell color = average reasoning band for that topic-level pair: green (3–4), amber (2), red (0–1)."
  long_md: |
    ## Topic heatmap color scale

    Each cell in the topic heatmap represents one topic × level combination.
    The color encodes the mean **reasoning band** (0–4) of all graded questions
    in that cell:

    | Color | Band range | Interpretation |
    |---|---|---|
    | Green | 3–4 | Strong reasoning; candidates consistently explained the concept |
    | Amber | 2 | Partial reasoning; correct answers but shallow justification |
    | Red | 0–1 | Weak reasoning; frequent guessing or pattern-matching |

    A cell shows as **grey** when fewer than two attempts have graded answers
    for that topic — not enough data to draw a meaningful conclusion.

    The **hit rate** (right side of each cell) is the fraction of questions in
    that cell answered correctly, regardless of reasoning band.

admin.reports.archetype.disclaimer:
  audience: admin
  short_text: "Archetypes are statistical descriptors, not diagnostic labels. Use them to guide learning — not hiring decisions."
  long_md: |
    ## Archetype disclaimer

    AssessIQ archetypes are computed by an AI rubric engine that scores
    reasoning quality on a 0–4 band scale. They are designed to identify
    **learning gaps and strengths at scale**, not to serve as a definitive
    measure of individual ability.

    **Do not use archetypes as the sole basis for hiring, promotion, or
    compensation decisions.** They are complementary signals to human
    review, structured interviews, and on-the-job evaluation.

    Archetype accuracy depends on:
    - Question prompt quality (well-scoped rubric anchors improve band accuracy)
    - Attempt length (short assessments yield less signal)
    - Current AI pipeline mode (`claude-code-vps` uses deterministic scoring;
      `anthropic-api` uses LLM-based reasoning-band scoring)

    Results should be reviewed alongside raw scores and grading transcripts.

admin.reports.export.format:
  audience: admin
  short_text: "Exports are available as CSV (Excel-compatible) or JSONL (one JSON object per line, for pipeline ingest)."
  long_md: |
    ## Export formats

    **CSV (`attempts.csv`)** — one row per scored attempt. Compatible with
    Excel, Google Sheets, and most BI tools. Columns:

    `tenant_id`, `assessment_id`, `assessment_name`, `user_id`, `user_email`,
    `attempt_id`, `status`, `submitted_at`, `total_earned`, `total_max`,
    `auto_pct`, `archetype`, `computed_at`

    **JSONL (`attempts.jsonl`)** — one JSON object per line. Use this for
    scripted pipeline ingest or when you need to preserve numeric precision.
    Each object has the same fields as the CSV.

    **Topic heatmap CSV (`topic-heatmap.csv`)** — one row per topic × level
    combination. Columns: `pack_id`, `level_id`, `topic`, `hit_rate`,
    `mean_band`, `attempt_count`.

    **Row cap:** all export endpoints are capped at 10,000 rows. If your
    tenant has more data, use the `submittedAfter` / `submittedBefore`
    filters to export in date-range batches.

    **Audit:** every export is logged in the audit trail with the acting
    admin's user ID and a timestamp.

admin.reports.cost.empty_in_claude_code_vps_mode:
  audience: admin
  short_text: "Cost breakdown requires anthropic-api mode. This deployment uses claude-code-vps — no per-call cost is metered."
  long_md: |
    ## Grading cost breakdown — not available in VPS mode

    The cost-by-month report tracks Anthropic API token spend per assessment.
    It is populated when `AI_PIPELINE_MODE=anthropic-api` is active.

    This deployment uses `claude-code-vps` mode: a human-operated Claude Code
    session runs the grading workflow on the VPS, and token costs are not
    metered through the AssessIQ billing system.

    If you switch to `anthropic-api` mode in a future deployment, the cost
    report will begin populating from that date forward.

admin.analytics.cohort_report:
  audience: admin
  short_text: "Aggregate metrics across all attempts in an assessment cycle: score distribution, archetype mix, and per-attempt scores."
  long_md: |
    ## Cohort report

    The cohort report summarises all scored attempts for a single assessment
    cycle. It is available at **Reports → Cycles → [cycle] → Cohort report**.

    **What you see:**

    | Field | Meaning |
    |---|---|
    | Total attempts | All attempts present in the analytics snapshot |
    | Graded count | Attempts in `graded` or `pending_admin_grading` status |
    | Released count | Attempts the admin has released to candidates |
    | Avg / P50 / P90 score | Percentage score distribution across the cohort |
    | Archetype distribution | How many attempts landed in each performance archetype |
    | Band avg | Mean score per assessment level (usually one level per cycle) |

    **Attempts table:** the lower table lists individual attempts, ordered by
    score descending, capped at 500 rows. Use the **archetype filter** to narrow
    to a specific archetype cluster.

    **Data freshness:** the report reads from the `attempt_summary_mv`
    materialized view, which is refreshed nightly at 02:00 UTC. Data added
    after the last refresh will not appear until the next refresh (or until a
    platform operator triggers a manual refresh).

    **What is excluded:** in-progress attempts (`in_progress`, `draft`) are
    excluded from the MV — only attempts with a computed score appear.

  related_keys:
    - admin.reports.cohort.distribution
    - admin.reports.heatmap.colors

# NOTE: This entry (admin.analytics.cohort_report) was added by the Phase 3
# G3.C analytics session. The admin-UI-toggle session also touches admin.yml —
# merge carefully if both sessions produce conflicting adjacent lines.

admin.audit:
  audience: admin
  short_text: "Browse, filter, and export every administrative action. Append-only — entries cannot be edited or deleted."
  long_md: |
    ## Audit log

    The audit log at `/admin/audit` records every significant administrative
    action taken in this tenant: user changes, grading overrides, certificate
    operations, setting updates, and more.

    **Browsing and filtering:**

    - **Action** — narrow to a specific action type (e.g. `user.role.changed`,
      `grading.override`). All known actions are listed in the dropdown.
    - **Actor kind** — filter by who triggered the action: a user session,
      an API key, or the system itself.
    - **Actor user ID** — paste a user UUID to see all actions taken by that
      user. A user-picker UI is planned for a future release.
    - **Entity type** — filter to actions that touched a specific resource
      type (e.g. `assessment`, `certificate`).
    - **From / To** — restrict to a date range. "From" starts at midnight;
      "To" ends at 23:59:59 UTC.

    Click **Apply** to run the filtered query. Click **Reset** to clear all
    filters and reload the full log.

    **Exporting:**

    Use **Export CSV** or **Export JSONL** to download the current filtered
    view. The download respects all active filters; the filename includes
    today's date. See `admin.audit.export.format` for column details.

    **Append-only guarantee:** entries are written synchronously with the
    operation and cannot be modified. Even platform super-admins cannot delete
    audit rows — this is enforced at the database layer.

  related_keys:
    - admin.audit.archives
    - admin.audit.export.format

admin.audit.archives:
  audience: admin
  short_text: "Older audit rows are archived to cold storage. Lists archives and lets you restore rows into the live table."
  long_md: |
    ## Archived audit log

    To keep the live `audit_log` table fast, rows older than the retention
    window are archived to cold storage (S3 in production). The **Archived
    audit log** card at the bottom of `/admin/audit` lists available archives.

    **Archive list columns:**

    - **Date** — the date range covered by the archive file.
    - **Rows** — how many audit log rows the archive contains.

    **Restoring an archive:**

    Click **Restore** on any archive row. A confirmation dialog shows the
    row count and asks you to confirm before copying rows back into the live
    `audit_log` table.

    Restored rows are immediately visible in the main audit table. The archive
    file itself is not deleted — the restore is additive only.

    **Phase note:** archiving requires `S3_BUCKET` to be configured. In a
    deployment without S3, the archives list will be empty and restores will
    return a 503. This is expected behaviour during local development or
    Phase 3 deployments without object storage.

  related_keys:
    - admin.audit

admin.audit.export.format:
  audience: admin
  short_text: "The audit log records admin actions (exports, grading, user changes) with actor, timestamp, and tenant scope."
  long_md: |
    ## Audit log

    AssessIQ maintains an append-only audit log for every significant admin
    action. Entries are written synchronously with the operation (not
    fire-and-forget) to guarantee no silent loss.

    **Audited actions include:**
    - `attempt.exported` — admin downloaded a CSV or JSONL export
    - `grading.override` — admin manually changed a grading band
    - `user.created`, `user.role_changed`, `user.deactivated`
    - `assessment.published`, `assessment.archived`
    - `pack.version_bumped`

    Audit log entries are immutable. They cannot be edited or deleted by any
    admin — including tenant super-admins. Retention is 7 years (configurable
    by the platform operator).

    The export audit entry includes `export_format` and the filter parameters
    used, so the exact dataset exported can be reconstructed.

admin.audit.archives.restore_procedure:
  audience: admin
  short_text: "Archived assessments are soft-deleted. Contact your platform admin to restore — no self-service restore in Phase 3."
  long_md: |
    ## Restoring archived assessments

    Archiving an assessment sets its status to `archived` and hides it from
    the active assessments list. The underlying data (attempts, gradings,
    scores) is fully preserved.

    **To restore** in the current Phase 3 build:

    1. Contact your AssessIQ platform administrator.
    2. Provide the assessment ID (visible in the audit log entry for the
       archive action).
    3. The admin updates `status = 'active'` and re-enables any active
       invite links.

    Self-service restore via the UI is planned for Phase 4.

# ─── Super-admin Platform provisioning (2026-05-17) ───

admin.platform:
  audience: admin
  short_text: "This is the platform operator page. You can add new companies and see every company on AssessIQ. Company admins never see this page."
  long_md: |
    ## What you can do here

    You are signed in as a **platform operator** — the person who runs
    AssessIQ for every company. This page is your control centre.

    **Add a new company.**
    Click **Create company**, then fill in three things:

    - the company's name,
    - a short web-friendly name for it (the "slug" — lowercase letters,
      numbers and hyphens; it is suggested for you from the name),
    - the email address of the person who will be that company's first
      administrator.

    AssessIQ then sets the company up and emails that person an invitation
    to sign in and take over their company. You do not manage the company's
    day-to-day work — its own administrator does that.

    **See every company.**
    The list below shows each company, its short name, whether it is active,
    and the date it was added.

    ## Good to know

    - **Only you see this.** Company administrators and reviewers never see
      the Platform page or this company list. Each company only ever sees
      its own data, never another company's.
    - **Extra sign-in check.** When you create a company, AssessIQ may ask
      for the 6-digit code from your authenticator app if it has been a
      while since you signed in. Just enter the code if prompted — anything
      you have already typed in the form is kept.
    - **What happens when you add a company.** AssessIQ creates the company,
      prepares its question categories, emails the first administrator, and
      switches the company on. If anything goes wrong partway through, the
      company is left switched off and you see an error — so a half-finished
      company is never live.
    - **What you cannot do from here.** This page does not let you log in as
      a company, change a company's questions or candidates, or remove a
      company. Those are deliberately separate; ask for them if you need them.

  related_keys:
    - admin.platform.slug
    - admin.platform.admin_email

admin.platform.slug:
  audience: admin
  short_text: "URL-safe company identifier. Auto-suggested from the name. Lowercase letters, digits, and hyphens only."
  long_md: |
    ## Company slug

    The slug is the short, URL-safe identifier for a tenant. It appears in
    webhook payloads, embed-iframe URLs, and the admin sign-in screen.

    **Rules:**
    - Lowercase letters (`a–z`), digits (`0–9`), and hyphens (`-`) only.
    - No leading or trailing hyphens.
    - Must be unique across all tenants — the form will show an error if the
      slug is already taken.

    **Auto-suggestion:** the form derives a slug from the company name
    (spaces and invalid characters become hyphens, result is lowercased). You
    can edit the slug freely before submitting.

    **Stability:** once a tenant is provisioned, the slug should be treated as
    permanent. Renaming a tenant slug is a manual operation that requires
    platform support.

admin.platform.admin_email:
  audience: admin
  short_text: "Email address of the company's first admin. An invitation link (valid 72 h) is sent here on provisioning."
  long_md: |
    ## First-admin email

    The email address entered here receives a one-time invitation link
    immediately after the tenant is provisioned. The link is valid for 72 hours.

    The invited user signs in via the link and is granted `role = admin` for
    the new tenant. They can then invite additional admins and reviewers from
    the Users page.

    If the invitation expires before the admin accepts it, a platform operator
    can re-provision or manually re-invite via the API.

admin.platform.domain:
  audience: admin
  short_text: "Optional email domain for the tenant (e.g. company.com). Used for display — not enforced as a sign-in restriction."
  long_md: |
    ## Tenant domain (optional)

    Recording the company's email domain (e.g. `company.com`) is informational
    only in Phase 1. It is stored on the tenant row and surfaced in the tenant
    list for operator reference.

    It does **not** currently restrict sign-in to that domain or auto-assign
    users. Domain-based SSO and auto-provisioning are planned for a future
    phase.

admin.platform.admin_name:
  audience: admin
  short_text: "Optional display name for the first admin. Shown in the invitation email if provided."
  long_md: |
    ## Admin display name (optional)

    If provided, the display name is included in the invitation email sent to
    the first admin. It is also set as the user's `name` field on account
    creation.

    Leave blank to send the invitation without a personalised greeting.

admin.platform.mfa_code:
  audience: admin
  short_text: "6-digit code from your authenticator app. Required before provisioning a new tenant (fresh-MFA gate)."
  long_md: |
    ## MFA step-up — authenticator code

    Creating a new company tenant is a high-privilege operation gated behind
    fresh TOTP verification (code must have been entered within the last 15
    minutes).

    If your session's MFA is stale, the create form switches to a step-up
    prompt. Enter the current 6-digit code from your authenticator app
    (Google Authenticator, Authy, 1Password, etc.) and click **Verify & create**.

    On success the platform automatically retries the create operation — you
    do not need to re-enter the form values.

    **Lockout:** five wrong codes in a row locks the account for 15 minutes.
    Wait for the lockout to expire before retrying.

    **Grading data:** attempts submitted before archiving retain their scores
    and archetype assignments. No re-grading is triggered on restore.

admin.notifications.in_app.short_poll_interval:
  audience: admin
  short_text: "In-app notifications are fetched every 15 seconds. There is no WebSocket push in Phase 3."
  long_md: |
    ## In-app notification polling

    The admin dashboard polls for new in-app notifications every **15 seconds**
    using a short-poll strategy. Notifications include:

    - Grading complete (an attempt's AI grading finished)
    - Bulk invite batch complete (all emails sent)
    - Assessment boundary transitions (e.g. attempt timer expired)

    **Why short-poll?** Phase 3 does not include a WebSocket server. Short
    polling over HTTPS is simpler to operate and sufficient for the current
    notification volume (< 10 tenants, < 100 concurrent admins).

    **Phase 4** will evaluate WebSocket or SSE push once the candidate UI
    (module 11) ships and real-time status updates become time-critical.

    If a notification arrives between polls, it will appear at the next tick.
    The 15-second window is intentional — it avoids overloading the DB with
    sub-second polling while keeping the perceived lag minimal for admin-level
    workflows.

# ─── Phase 2 G2.C — Admin grading UI (10-admin-dashboard) ───────────────────

admin.grading.queue.row:
  audience: admin
  short_text: "Each row is an attempt awaiting review. Click 'Review' to open the grading panel."
  long_md: |
    ## Grading queue row

    A row appears here when a candidate submits an attempt containing at least
    one subjective or scenario question. Clicking **Review** opens the attempt
    detail page, which simultaneously claims the attempt (`submitted →
    pending_admin_grading`) so other admins know you are reviewing it.

    The claim is soft: if you navigate away without grading, the attempt
    reverts to `submitted` on the next queue refresh.

admin.grading.queue.empty:
  audience: admin
  short_text: "No attempts awaiting grading. Either no assessments have run yet, or all attempts are already graded."
  long_md: |
    ## Empty grading queue

    The queue is empty when all submitted attempts have been graded and released,
    or when no assessments have had any submissions yet.

    If you expected to see something here, check:
    - The **Attempts** page with filter "All" — the attempt may already be
      in `graded` or `released` status.
    - Whether the assessment has expired or closed before candidates submitted.

admin.grading.proposal.anchors:
  audience: admin
  short_text: "Green chips = anchor phrases the AI found; grey chips = anchors it didn't detect."
  long_md: |
    ## Anchor findings

    Each anchor in the rubric is shown as a chip. **Green / hit** means the AI
    found the concept in the candidate's answer (with evidence shown on hover).
    **Grey / miss** means the concept was absent or the AI was not confident
    enough to flag it.

    Misses do not automatically reduce the score — band scoring is holistic.
    A band-3 answer can miss a minor anchor if the overall reasoning quality
    justifies it. Use the anchor display as a *starting point*, not a checklist.

admin.grading.proposal.band:
  audience: admin
  short_text: "The AI's verdict on reasoning quality: 0 = no credit, 1 = 25%, 2 = 50%, 3 = 75%, 4 = 100%."
  long_md: |
    ## Reasoning band

    Bands map to percentage scores: **0 → 0%, 1 → 25%, 2 → 50%, 3 → 75%,
    4 → 100%**. Raw floats are never surfaced — only these five values.

    The band represents the AI's holistic judgement of the candidate's
    reasoning quality, not a count of correct facts. A response that correctly
    identifies the right tool but fails to explain *why* it is right typically
    lands at band 2–3, not 4.

admin.grading.proposal.justification:
  audience: admin
  short_text: "The AI's free-text reasoning for its band choice. Read before accepting or overriding."
  long_md: |
    ## AI justification

    The AI grader writes a short explanation of why it chose the verdict it did.
    Read this before clicking Accept — it surfaces the evidence and reasoning
    that drove the band choice.

    If the justification is vague ("the answer is mostly correct"), that is a
    signal to run Stage 3 (Opus re-run) before accepting.

admin.grading.proposal.error_class:
  audience: admin
  short_text: "The error type if band < 3: missing_concept, wrong_tool, wrong_reasoning, partial_answer, or none."
  long_md: |
    ## Error class

    When the AI assigns band 0–2, it also assigns an error class:

    | Class | Meaning |
    |---|---|
    | `missing_concept` | Core concept absent from the answer |
    | `wrong_tool` | Candidate chose the wrong tool or approach |
    | `wrong_reasoning` | Tool is right but the explanation is incorrect |
    | `partial_answer` | Correct direction, incomplete execution |
    | `none` | No specific error class (band 3–4) |

    Error classes feed the cohort-level analytics (which error types are
    most common) and the archetype signal computation.

admin.grading.proposal.escalation:
  audience: admin
  short_text: "Stage-3 (Opus) re-run differs from Stage-2 (Sonnet) by ≥2 bands. Pick the verdict to keep."
  long_md: |
    ## Escalation diff

    When you click **Re-run with Opus**, Stage 3 grades the answer
    independently using a more powerful model. If the verdicts differ by 2 or
    more bands (e.g. Sonnet said band 2, Opus says band 4), the escalation diff
    appears side-by-side.

    You must pick one verdict and write a reconciliation note before submitting.
    The chosen stage is recorded on the `gradings` row so future analysis can
    identify systematic AI disagreements.

admin.grading.accept:
  audience: admin
  short_text: "Accept commits the AI's proposal to the gradings table. No fresh MFA required."
  long_md: |
    ## Accept AI proposal

    Clicking Accept:

    1. Writes the AI's band, score, anchor hits, and justification to the
       `gradings` table with `grader = 'ai'`.
    2. Does **not** release the attempt to the candidate — release is a
       separate action once all questions are graded.

    Accept does not require fresh MFA. Override does.

admin.grading.override.reason:
  audience: admin
  short_text: "Required when overriding the AI. Shown in audit exports and used for AI calibration feedback."
  long_md: |
    ## Override reason

    The override reason is mandatory and must be meaningful — it feeds:

    - The **audit trail** for HR and compliance exports.
    - Future AI calibration: patterns in override reasons help identify rubric
      gaps or systematic AI errors.

    Minimum useful length: one sentence describing *what was wrong* with the
    AI's verdict. "Wrong band" alone fails validation.

admin.grading.rerun.opus:
  audience: admin
  short_text: "Re-run with Opus (Stage 3) uses a more powerful model. Use for complex cases or appeals."
  long_md: |
    ## Re-run with Opus (Stage 3)

    Stage 3 uses Claude Opus — a more capable but slower model. Use it for:

    - Complex multi-step scenario answers where Sonnet's chain-of-thought
      seems shallow.
    - Appeals: the candidate disputes the grade and you want an independent
      high-quality re-assessment.
    - Calibration: spot-check whether Stage 2 verdicts hold up on a sample
      of high-stakes attempts.

    Stage 3 is billed at a higher token cost. The tenant budget guard tracks
    and may block if the monthly cap is near.

admin.grading.skill_drift:
  audience: admin
  short_text: "The prompt version used for this grade differs from the current live prompt. Consider re-grading."
  long_md: |
    ## Skill drift

    Each grading row records the SHA-256 hash of the prompt version that
    produced it. If the admin updates a grading skill (prompt template), rows
    graded with the old version are flagged with a **drift** badge.

    Drift is informational — it does not block releasing results. Use it as a
    signal to re-run affected attempts when a prompt change was material (e.g.
    a rubric anchor was corrected).

admin.scoring.attempt.total:
  audience: admin
  short_text: "Sum of earned points across all questions, normalized to 100. Bands are shown per-question only."
  long_md: |
    ## Total score

    The attempt total is a weighted sum of per-question scores, normalized to
    100. It is derived from the `attempt_scores` row written when all questions
    are graded.

    For subjective questions, the per-question score is `reasoning_band × 25`,
    so a band-3 answer on a 20-point question contributes 15 points.

    The total does **not** drive pass/fail thresholds directly — the archetype
    and cohort percentile are also factors. See `admin.scoring.cohort.percentiles`.

admin.scoring.attempt.archetype:
  audience: admin
  short_text: "Behavioral pattern derived from edit count, pace, flags, multi-tab, and copy-paste signals."
  long_md: |
    ## Archetype signals

    The archetype radar charts six behavioral signals collected during the attempt:

    | Signal | Measures |
    |---|---|
    | Pace | Median time per question |
    | Edits | Total edit count across answers |
    | Flags | Questions flagged for review |
    | Focus loss | Tab-blur events |
    | Copy/paste | Combined copy + paste events |
    | Multi-tab | Multi-tab conflict events |

    High edit counts combined with slow pace may indicate careful, deliberate
    work. High copy/paste with fast pace may indicate pasted content. Context
    matters — interpret signals holistically, not as individual scores.

admin.scoring.archetype.disclaimer:
  audience: admin
  short_text: "Behavioral signals are observational only. They do not affect the score and are not a proxy for integrity."
  long_md: |
    ## Archetype signal disclaimer

    Archetype signals are behavioral telemetry, not integrity flags. They:

    - Do **not** adjust the candidate's score in any direction.
    - Are **not** a proxy for cheating detection.
    - Are context-dependent: a slow pace on L3 scenarios is normal; the same
      pace on an L1 triage question might indicate difficulty.

    Use signals to understand cohort patterns (e.g. "L2 candidates average
    200 edits per attempt") not to make individual pass/fail decisions.

admin.scoring.cohort.percentiles:
  audience: admin
  short_text: "Rank within the cohort. 90th percentile = scored higher than 90% of candidates on the same assessment."
  long_md: |
    ## Cohort percentiles

    Cohort percentiles are computed once the cohort has ≥5 released results.
    They are recomputed on every new release.

    A candidate at the 90th percentile scored higher than 90% of the cohort
    on the same assessment + level. Percentiles are assessment-scoped — they
    do not span across assessments or levels.

    Phase 1 computes median and percentile bands (P25, P50, P75, P90). Full
    bell-curve distribution charts are a Phase 3 analytics feature.

admin.scoring.leaderboard.privacy:
  audience: admin
  short_text: "Anonymize toggle hides candidate emails. Leaderboard data is admin-only and never shown to candidates."
  long_md: |
    ## Leaderboard privacy

    The cohort leaderboard is visible to admins and reviewers only — candidates
    never see their rank or peers' scores.

    Use the **Anonymize** toggle to hide email addresses when screensharing
    or presenting cohort results to stakeholders. The setting is stored in your
    browser session only (not tenant-wide).

admin.rubric.anchor.weight:
  audience: admin
  short_text: "Fractional contribution of this anchor to the total rubric weight. All anchor weights must sum ≤ 1.0."
  long_md: |
    ## Anchor weight

    The weight controls how much this anchor contributes to the overall
    scoring floor. All anchor weights must sum to ≤ 1.0 (the UI shows the
    running total and blocks saving if exceeded).

    Recommended allocation: identify 2–4 *essential* anchors (weight 0.2–0.3
    each) and 2–4 *supporting* anchors (weight 0.05–0.1 each). Leave room in
    the total so a strong answer that covers most anchors isn't penalized by
    one missed nuance.

admin.rubric.anchor.synonyms:
  audience: admin
  short_text: "Comma-separated synonyms or equivalent phrasings the AI should treat as matching the anchor."
  long_md: |
    ## Anchor synonyms

    Add synonyms when the anchor concept has multiple correct phrasings.
    Example: anchor phrase "lateral movement", synonyms "east-west traffic,
    network pivoting, pivot host".

    Synonyms are case-insensitive and matched as substrings within the answer.
    Avoid overly broad synonyms that could match unrelated content.

admin.rubric.anchor.required:
  audience: admin
  short_text: "Required anchors must be present for the answer to score above band 0, regardless of overall quality."
  long_md: |
    ## Required anchor

    Marking an anchor **required** creates a hard floor: if the AI does not
    detect this concept, the band is capped at 0 regardless of the rest of
    the answer quality.

    Use sparingly — for concepts so fundamental that their absence represents
    a complete misunderstanding. For most anchors, leave required off and let
    the holistic band judgement do its work.

admin.rubric.reasoning.bands:
  audience: admin
  short_text: "Band labels and descriptions tell the AI how to distinguish between 0%, 25%, 50%, 75%, and 100%."
  long_md: |
    ## Reasoning bands

    Write a label and description for each of the five bands. These are
    included verbatim in the AI grading prompt — they are the specification
    the model grades against.

    Best practice:
    - **Band 4 (100%):** Complete, accurate, specific. Names tools, explains
      tradeoffs, shows system-level reasoning.
    - **Band 3 (75%):** Mostly correct. One missing element or weak rationale.
    - **Band 2 (50%):** Correct direction, significant gaps. Explains *what*
      but not *why*, or vice versa.
    - **Band 1 (25%):** Shows partial understanding. More wrong than right.
    - **Band 0 (0%):** No credit. Blank, off-topic, or fundamentally wrong.

admin.rubric.error_classes:
  audience: admin
  short_text: "Error classes tag low-band answers for cohort analytics. Choose the one that best describes the failure."
  long_md: |
    ## Error classes

    Error classes are assigned by the AI when band < 3 and aggregated in the
    cohort analytics view. They answer: "what kind of mistake did candidates
    make most often on this question?"

    Available classes:
    - `missing_concept` — the core concept was absent
    - `wrong_tool` — candidate chose the wrong approach
    - `wrong_reasoning` — reasoning is incorrect despite using the right tool
    - `partial_answer` — correct direction, incomplete

    Admin overrides can also set the error class. If no class applies, leave
    as `none`.

admin.settings.billing.budget:
  audience: admin
  short_text: "Monthly grading run cap per tenant. Default: 100 runs/month. Resets on the 1st of each month."
  long_md: |
    ## Grading budget cap

    The budget guard limits AI grading runs to protect against runaway costs.
    A "run" is one call to the grading pipeline per question — a 10-question
    attempt uses 10 runs.

    Default cap: 100 runs/month per tenant. Contact support to raise the cap.
    The `tenant_grading_budgets` table holds the current usage and cap; a
    platform admin can edit it directly until Phase 3 ships a settings UI.

admin.settings.billing.alert_threshold:
  audience: admin
  short_text: "Notify the admin when monthly usage exceeds this percentage of the cap (default: 80%)."
  long_md: |
    ## Budget alert threshold

    When monthly grading usage crosses this fraction of the cap, AssessIQ sends
    an in-app notification and email to all tenant admins. Default: 80%.

    The notification is informational — grading continues until the hard cap
    is hit. Raise the cap in `tenant_grading_budgets` before that happens.

admin.settings.help_content.markdown:
  audience: admin
  short_text: "Help text supports Markdown. Preview shows plain text only — full rendering launches in Phase 3."
  long_md: |
    ## Help content Markdown

    Help text bodies accept GitHub-flavored Markdown: headings, bold, italic,
    code blocks, ordered/unordered lists, and tables.

    The Phase 2 admin editor shows a **plain-text preview** only. Full Markdown
    rendering in the editor is deferred to Phase 3. Candidates and admins who
    read the help drawer see rendered Markdown via the `HelpProvider` component.

    **What to avoid:**
    - Raw HTML tags — they are stripped before storage.
    - Inline images — not supported in this phase.
    - Custom CSS classes — the design system renders Markdown in a sandboxed
      `aiq-prose` container with fixed styles.

# ─── Stage 1.5+ admin features (shipped week of 2026-05-10) ─────────────────

admin.generation_attempts.history:
  audience: admin
  short_text: "Cross-pack history of every AI question-generation run. Filter by status, score in-app, and inspect stderr without SSH."
  long_md: |
    ## AI generation attempt history

    The **Generation history** page (`/admin/generation-attempts`) lists every
    call to the AI question-generation pipeline across all packs and levels.

    **What you can do here:**

    - Filter by status (`success`, `partial`, `failed`, `running`) or by pack
      using the chip row at the top.
    - Expand a row to see `stderr_tail` — the last lines of output from the
      generation run — useful for diagnosing failures without SSH access.
    - Click **Score this attempt** to run structural quality checks and runtime
      metric comparisons server-side and see the results inline — no CLI or SSH
      required.
    - Page forward and backward through older runs via offset-based pagination.

    **Status meanings:**

    | Status | Meaning |
    |---|---|
    | `success` | All requested questions were generated and inserted |
    | `partial` | Some questions were inserted; one or more chunks failed |
    | `failed` | No questions were inserted; the run terminated with an error |
    | `running` | Generation is in progress |

# ─── Super-admin settings (Stage 3 rollout, 2026-05-10) ───

admin.settings.ai_generate_mode:
  audience: admin
  short_text: "AI question generation mode: omnibus = single prompt; sharded = one prompt per question type. Effective on next request."
  long_md: |
    ## AI Generation Mode

    Controls how AI question generation works for this tenant.

    | Value | Meaning |
    |---|---|
    | **Use global default** | Inherits the platform-wide `AI_GENERATE_MODE` env var (currently `omnibus`). Reset to this if you want to undo a tenant-specific override. |
    | **omnibus** | All questions are generated in a single AI prompt. Lower latency but no per-type quality tuning. |
    | **sharded** | Questions are generated in separate per-type prompts (one each for mcq, log_analysis, scenario, kql, subjective). Higher fidelity; slightly longer wall-clock time. |

    **Stage 3 rollout context:** `sharded` is the target production default once
    five consecutive smoke runs pass all gating criteria (G1–G5, see
    `docs/design/2026-05-10-stage-3-promotion-rollout.md §2`). Until then, the
    global default remains `omnibus` and individual tenants are promoted to
    `sharded` one at a time as a quality pilot.

    **Audit trail:** Every change to this setting is recorded in the tenant's
    audit log (`action: tenant_settings.ai_generate_mode.updated`) with the
    before value, after value, and the identity of the operator who made the
    change.

    **Operator note:** If you need to flip the mode without a UI session (e.g.
    during a hotfix), run:
    ```sql
    UPDATE tenant_settings SET ai_generate_mode = 'omnibus' WHERE tenant_id = '<uuid>';
    ```
    on the VPS. No container restart required; the change takes effect on the
    next generation request. The global fallback remains the `AI_GENERATE_MODE`
    env var when the column is NULL.
  related_keys:
    - admin.settings.billing.budget

admin.questions.bulk.archive:
  audience: admin
  short_text: "Archive up to 200 questions at once from pack-detail. Archived questions leave the active pool immediately."
  long_md: |
    ## Bulk archive

    The bulk-archive action removes questions from the active pool in one
    operation. Select individual rows with the per-row checkbox, or use
    **Select all (filtered)** to grab every question matching the current
    filter. A sticky action bar appears when any row is checked.

    **Limits and constraints:**

    - Maximum 200 question IDs per request. For larger batches, filter and
      archive in multiple passes.
    - Questions already `archived` are silently skipped in the batch.
    - `archived → active` transitions are **not available in bulk** for audit
      reasons. To reactivate an archived question, open it individually.

    **Audit trail:** each bulk-archive operation is recorded as a single audit
    entry with the list of IDs and the acting admin's user ID.

    > **Caution:** archive is not reversible in bulk. Reactivate per-question
    > if you archived something by mistake.

admin.questions.bulk.approve:
  audience: admin
  short_text: "Activate up to 200 ai_draft questions at once. Each draft enters the active pool immediately on approval."
  long_md: |
    ## Bulk approve (activate)

    Bulk approve transitions selected `ai_draft` questions to `active` in one
    operation, adding them to the question pool immediately. Use this after
    reviewing a generation batch where the drafts look consistent and correct.

    **Workflow:**

    1. Generate questions on a level row.
    2. Review a sample of the `ai_draft` questions individually.
    3. Select all (or a subset) that pass review.
    4. Click **Approve** in the sticky action bar and confirm in the modal.

    **Limits:**

    - Maximum 200 IDs per request.
    - Only `ai_draft` and `inactive` questions can be approved in bulk.
      Questions already `active` or `archived` are skipped silently.

    > **Caution:** bulk approve bypasses individual review for each question.
    > Sample the batch first; only bulk-approve when quality is consistent.

admin.questions.generate.modal:
  audience: admin
  short_text: "Control how many questions to generate per type. Auto-weighted defaults come from L1/L2/L3 weight tables."
  long_md: |
    ## Generate questions modal — per-type distribution

    The Generate modal shows a **per-type chip row** alongside the total count
    input. Each chip (MCQ, KQL, Scenario, Subjective) shows the auto-weighted
    count calculated from the pack's L1/L2/L3 weight table.

    **Using per-type overrides:**

    - Click a chip to open the per-type count spinner.
    - Adjust the count for each type. The total across types must equal the
      requested count — a running-sum indicator validates this in real time.
    - Click **Reset** to restore the auto-weighted defaults.

    **Subjective handling:**

    - In **omnibus mode**, subjective questions fold into the MCQ quota and
      use the same generation call.
    - In **sharded mode** (Stage 2+), subjective is its own generation call
      with a separate `generate-rubric` skill pass before insert.

    ### Notes

    - The 1–30 cap applies to the total, not per type.
    - Overrides are one-time — they reset on the next modal open.
    - Parallel chunking (1–10 / 11–20 / 21–30) and the 5-minute prompt
      cache window still apply; see `admin.questions.generate.draft` for
      timing details.

admin.questions.subjective:
  audience: admin
  short_text: "Open-ended written-reasoning questions scored via AI rubric. Rubric is generated separately; admin must activate."
  long_md: |
    ## Subjective questions

    Subjective questions present a freeform prompt to candidates, who type a
    written response. There are no multiple-choice options, no expected syntax,
    and no keyword hints. Scoring is AI-driven against rubric anchors.

    **Authoring flow:**

    1. Generate (or import) a subjective question — it enters `ai_draft`.
    2. Open the draft in the question editor.
    3. Review or edit the rubric anchors (auto-generated via the
       `generate-rubric` skill during generation in sharded mode).
    4. Activate the question to add it to the pool.

    **Candidate experience:**

    - Sees the prompt and a freeform text area.
    - No syntax hints or expected-keyword display.
    - Response length is unconstrained within the attempt time limit.

    **Grading:** AI scores the written response against the rubric anchors
    using Stage 2 (Sonnet) by default. Admin can re-run or override.

admin.questions.attempt_status:
  audience: admin
  short_text: "Color-coded status on each level row shows the latest generation-attempt result. Expands to show details on failure."
  long_md: |
    ## Generation-attempt status on level rows

    Each level row in pack-detail shows a small status indicator reflecting
    the most recent generation attempt for that pack + level combination.

    **Status colors:**

    | Color | Status | Meaning |
    |---|---|---|
    | Green | `success` | Last run succeeded; all requested questions inserted |
    | Amber | `partial` | Some questions inserted; one or more chunks failed |
    | Red | `failed` | No questions inserted; run terminated with an error |
    | Blue (animated) | `running` | Generation is in progress |

    The row **polls automatically** when status is `running`, re-fetching
    every few seconds. After 10 consecutive polls with no status change,
    polling stops — refresh the page or visit the generation-history page for
    the full `stderr_tail`.

    For `failed` or `partial` rows, expand the status disclosure to see a
    brief error summary. The full `stderr_tail` is available on the
    generation-history page (`/admin/generation-attempts`).

admin.ops.cli.cleanup:
  audience: admin
  short_text: "Server-side CLI scripts to archive stale ai_draft questions and mark orphaned running attempts as failed."
  long_md: |
    ## Operational cleanup CLI scripts

    Two CLI helpers are available on the VPS for periodic housekeeping. They
    are not exposed in the admin UI — run them via SSH when needed.

    ### Archive stale ai_draft questions

    ```bash
    pnpm tsx tools/cleanup-stale-drafts.ts [--dry-run] [--older-than-days N]
    ```

    Archives `ai_draft` questions that have been in draft state for more than
    N days (default: 30). Use `--dry-run` to preview affected IDs before
    committing.

    ### Mark orphaned running attempts as failed

    ```bash
    pnpm tsx tools/cleanup-orphaned-attempts.ts [--dry-run] [--older-than-minutes N]
    ```

    Marks `generation_attempts` rows stuck in `running` state for more than
    N minutes (default: 30) as `failed`. Useful after a server restart that
    left in-flight attempts hanging.

    **When to run:**

    - After a VPS restart or deployment that interrupted a generation run.
    - During monthly housekeeping to clear accumulated stale drafts.
    - If the generation-history page shows many `running` rows that never
      transitioned.

admin.ops.cli.inspect_attempt:
  audience: admin
  short_text: "Diagnostic dump for any generation_attempts row — status, timing, inserted question IDs, and stderr. CLI only."
  long_md: |
    ## inspect-attempt CLI tool

    The `inspect-attempt` subcommand produces a structured diagnostic report
    for a single `generation_attempts` row. Use it when the generation-history
    page shows a failure but you need more detail than `stderr_tail` provides.

    ```bash
    pnpm tsx tools/inspect-attempt.ts <attempt-id>
    ```

    **Output includes:**

    - Attempt metadata: status, pack, level, skill SHA, model, duration.
    - Chunk plan: how many chunks were planned vs failed.
    - Inserted question IDs (if any succeeded before the failure).
    - Full `stderr_tail` (not truncated as in the UI).
    - Dedupe drop count and topic list.

    **When to use:**

    - A `partial` run left some questions but you need to know which chunks
      failed and why.
    - A `failed` run shows no stderr in the UI; the full output may have been
      captured earlier in the log.
    - Support escalations where you need to attach the full run context.

    The attempt ID is visible on the generation-history page row.

admin.attempts.grading_dispatch:
  audience: admin
  short_text: "Each question type routes to a different grading method: mcq direct-compare, kql keyword-match, others via AI."
  long_md: |
    ## Per-type grading dispatch

    When grading runs for a submitted attempt, each question is routed to the
    appropriate scoring method based on its type:

    | Type | Method |
    |---|---|
    | `mcq` | Direct comparison against the correct answer key — no AI call |
    | `kql` | Keyword-match against `expected_keywords` plus AI syntactic check |
    | `log_analysis` | AI rubric scoring; rubric synthesized at grade-time from `expected_findings` — no admin rubric authoring needed |
    | `scenario` | AI rubric scoring using admin-authored anchors |
    | `subjective` | AI rubric scoring using admin-authored or generated anchors |

    **log_analysis note:** the rubric for `log_analysis` questions is derived
    automatically from `expected_findings` — admins do not need to author
    rubric anchors for this type. The AI synthesizes scoring criteria at
    grade-time from the expected findings field.

    MCQ and KQL grading is deterministic and fast (< 50 ms per question).
    AI-routed types add 15–90 s per question depending on model and cache.

admin.attempts.session_idle:
  audience: admin
  short_text: "If the grading tab is idle for 5 minutes, a dismissible banner warns you. Click Refresh to resume without data loss."
  long_md: |
    ## Session-idle heartbeat and error banner

    The attempt-detail page sends a heartbeat to the server every 5 minutes
    while open. If the tab goes idle (backgrounded or the browser throttles
    JavaScript timers), the heartbeat may miss a tick.

    **What you see:**

    - After the first missed heartbeat, a yellow **"Session idle"** banner
      appears at the top of the grading panel.
    - If a grade action fails with a server error, a red **error banner**
      appears instead of the blank-red page that appeared in earlier versions.

    **Recovering:**

    - Click **Refresh** in the banner. The page re-fetches the latest attempt
      state from the server. Grades already accepted are preserved; unsaved
      override text in the form is lost.
    - No data is corrupted by the idle period — the heartbeat is advisory
      only and does not gate grading operations.

    **When this typically happens:**

    - Long review sessions (> 5 min on a single question without interaction).
    - Browser tab backgrounding with aggressive timer throttling.
    - Brief network interruptions that resolve before the next action.

# ─── Phase 5 Credentialize — certificate management ───

admin.certificates.list:
  audience: admin
  short_text: "View and manage tenant credentials. Revoke compromised certificates or reissue when a snapshot field needs correction."
  long_md: |
    ## Certificate management

    The **Certificates** page (`/admin/certificates`) lists every credential
    issued to candidates in this tenant, newest first.

    **What you can do here:**

    | Action | When to use |
    |---|---|
    | **Revoke** | Certificate was issued in error, a candidate's access should be revoked, or the credential has been compromised |
    | **Reissue** | The candidate's display name was wrong at issuance and needs correction |

    **Columns:**

    - `credential_id` — the public slug used in LinkedIn share URLs and QR codes
    - `user_email` — the candidate's current email (may differ from name on cert)
    - `tier` — Completion, Distinction, or Honors
    - `issued_at` — when the credential was first issued (never changes on reissue)
    - `status` — Active or Revoked

    **Filter chips:** narrow by tier or status to find specific credentials quickly.

    **Counters:** pdf_downloads, linkedin_shares, and verification_views are tracked
    per credential and visible in the audit log.

  related_keys:
    - admin.certificates.revoke
    - admin.certificates.reissue

admin.certificates.revoke:
  audience: admin
  short_text: "Revoke sets verify page to revoked, blocks PDF. Reason is audit-logged and visible on the verify page."
  long_md: |
    ## Revoking a certificate

    Revocation is a **soft delete** — the credential record is preserved and
    the verify page still loads, but displays a red "Revoked" badge instead of
    a green verification check.

    **Effects of revocation:**

    - Public verify page (`/verify/<credential_id>`) shows red badge + revoke reason
    - PDF download returns 410 Gone
    - Share buttons are disabled in the candidate's "My Certificates" view
    - Revoke reason is written atomically to the audit log

    **The reason field is required** (1–500 characters). It appears on the
    public verify page, so write it as a professional explanation that a
    recruiter might read: e.g., "Certificate issued in error — assessment was
    invalidated." rather than internal jargon.

    **Revocation is irreversible.** A revoked certificate cannot be reissued
    (use the issue flow to create a new certificate if the candidate re-earns
    the credential). Revocations are logged in the audit trail with the
    acting admin's identity.

  related_keys:
    - admin.certificates.list

admin.certificates.reissue:
  audience: admin
  short_text: "Re-snapshots display fields (name etc.) without rotating credential_id or issued_at — LinkedIn share URLs stay valid."
  long_md: |
    ## Reissuing a certificate

    Reissue is used for **name corrections** — when a candidate's display
    name was wrong at issuance and needs to be fixed on the certificate.

    **What reissue does:**

    - Updates `display_name` to the new value (or re-snapshots from the current
      user record if no override is provided)
    - Recomputes the HMAC signature over the updated fields
    - **Preserves** `credential_id` and `issued_at` — any LinkedIn share
      URLs or QR codes the candidate already distributed continue to resolve
      to the correct verify page

    **What reissue does NOT do:**

    - Rotate `credential_id` or `issued_at`
    - Change the tier or course_title
    - Affect revoked certificates (revoked certs return 410 if reissue is attempted)

    **When to use vs. when NOT to use:**

    | Use reissue | Do NOT use reissue |
    |---|---|
    | Legal name change on a valid cert | Candidate did not actually earn the tier |
    | Typo in the display name | Certificate should be revoked |
    | Re-snapshot after a profile correction | Course title changed (snapshot is intentional) |

    Reissue is audited: before/after display_name is recorded with the acting
    admin's identity.

  related_keys:
    - admin.certificates.list
    - admin.certificates.revoke

admin.certificates.revoke_reason:
  audience: admin
  short_text: "Explain why this certificate is being revoked."
  long_md: |
    ## Revoke reason

    Explain why this certificate is being revoked. This reason is stored with
    the certificate record. Minimum 10 characters required.

    The reason is visible to admins on the certificate detail page and on the
    public verify page (so verifiers know the credential is no longer valid).
    It is **not** recorded in the audit log to avoid storing potentially
    sensitive text in an append-only log.

  related_keys:
    - admin.certificates.revoke

# ─── Phase 11 Activity page ───────────────────────────────────────────────────

admin.activity.heatmap.legend:
  audience: admin
  short_text: Heatmap color bands — from no activity (lightest) to highest activity (darkest indigo).
  long_md: |
    ## Heatmap intensity bands

    Each cell represents one day. The five intensity levels are:

    | Band | Count |
    |---|---|
    | 0 (empty) | No submissions that day |
    | 1 (light) | 1–2 submissions |
    | 2 | 3–5 submissions |
    | 3 | 6–10 submissions |
    | 4 (dark) | 11 or more submissions |

    Counts reflect completed (submitted/graded/released) attempts in your tenant only.
    The heatmap always shows the rolling 52-week window ending today — it does not
    respond to the period toggle (which controls the stat cards and leaderboard).

  related_keys:
    - admin.activity.streak.explanation

admin.activity.streak.explanation:
  audience: admin
  short_text: Current streak counts consecutive days with at least one submission; longest streak is the all-time best.
  long_md: |
    ## Streak calculation

    **Current streak** — the number of consecutive calendar days (ending today or
    yesterday) on which at least one assessment was submitted. A day with zero
    submissions resets the streak to 0.

    **Longest streak** — the longest unbroken run of active days in the 365-day
    window queried by the heatmap endpoint. If today has no submissions yet, the
    current streak may be shorter than yesterday's value until the first submission
    of the day is recorded.

    Streaks are computed in TypeScript from the daily bucket data — no SQL window
    functions — so they reflect the live `attempts` table with same-day precision.

  related_keys:
    - admin.activity.heatmap.legend

admin.activity.leaderboard.delta:
  audience: admin
  short_text: Delta % compares current-period submission count to the prior period of equal length; null when a pack is new.
  long_md: |
    ## Leaderboard delta

    Each leaderboard row shows a **delta** between the current period and the
    immediately preceding period of equal length:

    - **Week:** current 7 days vs prior 7 days
    - **Month:** current 30 days vs prior 30 days
    - **Quarter:** current 90 days vs prior 90 days

    The delta is `((current − prior) / prior) × 100`, rounded to one decimal place.

    **Direction indicators:**
    - ↑ Up — delta > +0.5%
    - ↓ Down — delta < −0.5%
    - Flat — delta within ±0.5% (small noise suppression)

    **Null delta** — shown when the pack had zero submissions in the prior period
    but has submissions in the current period (new entry, no baseline to compare).

    The leaderboard groups by question pack (catalog-wide rollup), so a pack with
    multiple active assessment cycles appears as one row.

  related_keys:
    - admin.activity.heatmap.legend

# ─── G3.B Worker observability (2026-05-13) ───────────────────────────────────

admin.worker:
  audience: admin
  short_text: "BullMQ queue health — depth, completed count, failed jobs. Covers email, webhooks, and cron. Never AI grading."
  long_md: |
    ## Worker observability

    The **Worker** page (`/admin/worker`) shows the runtime state of the
    `assessiq-cron` BullMQ queue — the background job queue that handles:

    - **Email delivery** — invitation emails, notification emails
    - **Webhook delivery** — outbound payloads to tenant-configured endpoints
    - **Cron jobs** — assessment boundary transitions and attempt timer sweeps

    **This queue never runs AI grading.** AI grading is sync-on-click only —
    it runs when you click "Grade all" on an attempt, not in the background.

    **Stats grid:**

    | Card | What it shows |
    |---|---|
    | Queue depth | Waiting + delayed jobs. Zero is healthy. |
    | Completed (lifetime) | Total jobs completed since the queue was created. Failed count shown below. |
    | Queue status | Live chip breakdown: waiting / active / delayed / completed / failed |

    **Auto-refresh:** the stats update every 10 seconds. The page pauses
    polling when the browser tab is hidden and resumes when you return.
    The "Updated Xs ago" indicator shows time since the last successful fetch.

    **Stats cache:** the server caches queue counts for 5 seconds to prevent
    Redis from being hammered if multiple admins have the page open.

  related_keys:
    - admin.worker.failed
    - admin.worker.retry

admin.worker.failed:
  audience: admin
  short_text: "Failed jobs are BullMQ jobs that exhausted all retry attempts. Click a job ID to expand its payload and error stack."
  long_md: |
    ## Failed jobs

    A job appears in this list when it has exhausted all retry attempts
    (maximum 5) without succeeding. The retry schedule is exponential backoff:
    approximately 1s, 2s, 4s, 8s between attempts (with jitter).

    **Table columns:**

    | Column | Content |
    |---|---|
    | Job ID | First 8 characters of the BullMQ job ID. Click to expand. |
    | Type / Queue | The job name (e.g. `email.send`, `webhook.deliver`, `assessment-boundary-cron`) |
    | Last error | First line of the final failure reason |
    | Attempts | How many times the job was tried before landing here |
    | Failed at | Timestamp of the final failure |
    | Actions | Retry button |

    **Expanded row:** clicking the job ID or "Expand" shows:

    - **Job payload** — the data the job was created with, rendered as formatted
      JSON in a brand-token monospaced block. Sensitive fields are redacted
      server-side (keys matching `token`, `password`, `secret`, `answer`,
      `candidate`, `auth`, `session` show as `[Redacted]`).
    - **Error stack (tail)** — the last 1 KB of the stack trace from the final
      failure attempt.

    **Empty state:** "No failed jobs — all healthy." means all jobs eventually
    succeeded or are still in progress.

  related_keys:
    - admin.worker
    - admin.worker.retry

admin.worker.retry:
  audience: admin
  short_text: "Re-enqueues the failed job at attempt N+1. Use after fixing the root cause (e.g. SMTP outage, webhook endpoint down)."
  long_md: |
    ## Retrying a failed job

    Clicking **Retry** on a failed job re-enqueues it with:

    - The original job payload (unchanged)
    - `attemptsMade` incremented by 1 (so a job that failed 5 times shows
      attempt 6 on retry)
    - No delay — the job runs on the next available worker tick

    **A confirmation modal appears** before the retry fires, showing the job
    ID and the new attempt count. Click Cancel if you changed your mind.

    **On success:** the job disappears from the failed list immediately
    (optimistic removal). If the retry fails again, it will reappear in the
    list on the next page refresh.

    **When to retry:**

    | Job type | Retry when |
    |---|---|
    | `email.send` | SMTP outage has resolved; the target mailbox is valid |
    | `webhook.deliver` | The receiving endpoint is back up; 5xx errors resolved |
    | `assessment-boundary-cron` | The database connection issue that caused the failure is resolved |
    | `attempt-timer-sweep` | Same as above — idempotent, safe to re-run |

    **Idempotency note:** the two cron job types (`assessment-boundary-cron`,
    `attempt-timer-sweep`) are idempotent — re-running them on already-processed
    rows is a SQL no-op and causes no side effects. It is safe to retry them
    even if you are unsure whether the previous run partially succeeded.

  related_keys:
    - admin.worker
    - admin.worker.failed

# ─── 13-notifications — Webhooks management (2026-05-13) ─────────────────────

admin.webhooks:
  audience: admin
  short_text: "Register outbound webhooks for real-time events when AssessIQ actions occur (submitted, graded, cert issued, etc.)."
  long_md: |
    ## Webhooks

    The **Webhooks** page (`/admin/webhooks`) lets you register HTTPS endpoints
    that receive a POST request whenever an AssessIQ event fires.

    **What you can do here:**

    | Action | Description |
    |---|---|
    | **New webhook** | Register a new endpoint — provide an https:// URL, select the events you want, and optionally supply your own signing secret |
    | **Test** | Fire a synthetic `test.ping` event to verify the endpoint is reachable |
    | **Revoke** | Permanently remove the endpoint — no further events will be delivered |
    | **View payload** | Expand a delivery row to see the full JSON payload (truncated to 2KB in-UI; Download for full) |
    | **Replay** | Re-fire a past delivery to an endpoint (creates a new delivery row; the original is unchanged) |
    | **Retry** | Re-attempt a delivery that exhausted all retries |

    **Signing secrets:** each endpoint has a shared HMAC secret used to sign
    every webhook payload. The plaintext secret is shown exactly once at
    creation — save it immediately. Verify signatures with
    `HMAC-SHA256(secret, rawBody)` against the `X-AssessIQ-Signature` header.

    **`audit.*` subscriptions** require a fresh MFA verification (within 5
    minutes) when creating the endpoint. This is a server-side gate — the UI
    shows a warning but the server enforces it unconditionally.

  related_keys:
    - admin.webhooks.events
    - admin.webhooks.deliveries
    - admin.webhooks.replay

admin.webhooks.events:
  audience: admin
  short_text: "Subscribable event types: attempt lifecycle, assessment state changes, user events, cert issuance/revocation, audit.*."
  long_md: |
    ## Webhook event types

    Select one or more events when registering a webhook endpoint. Your server
    will receive a POST for each event that fires in your tenant.

    | Event | Fires when |
    |---|---|
    | `attempt.submitted` | A candidate submits their assessment attempt |
    | `attempt.graded` | AI grading completes for an attempt |
    | `attempt.released` | An admin releases graded results to the candidate |
    | `assessment.published` | An assessment moves to `published` status |
    | `assessment.closed` | An assessment closes (scheduled or early) |
    | `user.invited` | A new admin or candidate is invited |
    | `user.role_changed` | An existing user's role is changed |
    | `certificate.issued` | A new certificate is issued to a candidate |
    | `certificate.revoked` | A certificate is revoked |
    | `audit.*` | **All audit-log events** — requires fresh MFA at subscription time |

    **Payload shape (all events):**

    ```json
    {
      "event": "attempt.submitted",
      "tenant_id": "<uuid>",
      "occurred_at": "<ISO8601>",
      "data": { ... }
    }
    ```

    The `data` object shape is event-specific. Use the **Test** action to verify
    your endpoint accepts the envelope format before subscribing to live events.

  related_keys:
    - admin.webhooks

admin.webhooks.deliveries:
  audience: admin
  short_text: "Last 25 webhook deliveries per page: event type, URL, HTTP status, latency, and full payload (expandable)."
  long_md: |
    ## Webhook delivery history

    The **Recent deliveries** table shows every webhook POST attempt, newest
    first. Each row shows:

    | Column | Meaning |
    |---|---|
    | **Event** | The event type that triggered this delivery |
    | **URL** | The endpoint URL (truncated for display; full URL on hover) |
    | **Status** | HTTP response code — green (2xx), amber (4xx), red (5xx) |
    | **Latency** | Round-trip time from dispatch to response |
    | **Timestamp** | When the delivery was attempted |

    **Viewing the payload:** click **View payload** to expand the row and see
    the JSON request body. Payloads larger than 2KB are truncated in the UI;
    a **Download** link fetches the full payload as a `.json` file.

    **Replay:** re-fire any delivery using the **Replay** button. A confirmation
    modal appears first. Replay creates a *new* delivery row — the original
    record is never modified (append-only audit invariant).

    **Pagination:** 25 rows per page. Use the Prev/Next controls to browse
    older deliveries.

    **Delivery status meanings:**

    | Status | Meaning |
    |---|---|
    | `pending` | Queued; not yet attempted |
    | `delivered` | HTTP 2xx received |
    | `failed` | All retries exhausted with non-2xx or connection error |

  related_keys:
    - admin.webhooks
    - admin.webhooks.replay

admin.webhooks.replay:
  audience: admin
  short_text: "Replay re-fires a past delivery to its endpoint. A new delivery record is created — the original is never modified."
  long_md: |
    ## Replay and retry

    **Replay** (recent deliveries table) and **Retry** (failed deliveries table)
    both re-send a delivery to its original endpoint. The difference is context:

    | Action | Table | When to use |
    |---|---|---|
    | **Replay** | Recent deliveries | Re-fire any delivery — successful or not — to re-test your endpoint or re-process data |
    | **Retry** | Failed deliveries | Re-attempt a delivery that exhausted all automatic retries |

    **Invariant:** both actions create a *new* `webhook_deliveries` row linked
    to the same endpoint and event payload. The original row is never updated —
    the delivery log is append-only for audit compliance.

    **Idempotency:** your endpoint should handle duplicate deliveries. Include
    the `X-AssessIQ-Delivery-ID` header in your deduplication logic — it is
    unique per delivery row, so a replayed delivery has a different ID from the
    original.

    **Signature:** replayed deliveries are re-signed with the current endpoint
    secret. If you rotated the secret between the original delivery and the
    replay, verify against the new secret.

  related_keys:
    - admin.webhooks
    - admin.webhooks.deliveries

