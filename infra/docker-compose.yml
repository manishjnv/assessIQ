# AssessIQ — infra Compose file (Phase 0+)
# On the VPS this is symlinked or copied to /srv/assessiq/docker-compose.yml.
# Only assessiq-frontend publishes a host port (9091:80).
# Caddy on the box (owned by ti-platform) handles TLS edge; do NOT add nginx or certbot here.
# Secrets dir (secrets/pg_password.txt) lives at repo root, one level above this file.
# Build contexts are set to repo root (..); Dockerfiles are under infra/docker/.

name: assessiq

x-defaults: &svc-defaults
  restart: unless-stopped
  init: true
  logging:
    driver: json-file
    options: { max-size: "20m", max-file: "5" }

networks:
  assessiq-net:
    name: assessiq-net
    driver: bridge

volumes:
  assessiq_pgdata:
  assessiq_redis:

secrets:
  pg_password:
    file: ../secrets/pg_password.txt

services:
  assessiq-postgres:
    <<: *svc-defaults
    image: postgres:16-alpine
    container_name: assessiq-postgres
    networks: [assessiq-net]
    environment:
      POSTGRES_DB: assessiq
      POSTGRES_USER: assessiq
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    volumes:
      - assessiq_pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    secrets: [pg_password]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assessiq -d assessiq"]
      interval: 10s
      timeout: 3s
      retries: 5

  assessiq-redis:
    <<: *svc-defaults
    image: redis:7-alpine
    container_name: assessiq-redis
    networks: [assessiq-net]
    command: ["redis-server", "--appendonly", "yes", "--save", "60 1000"]
    volumes:
      - assessiq_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  assessiq-api:
    <<: *svc-defaults
    image: assessiq/api:${IMAGE_TAG:-latest}
    container_name: assessiq-api
    build:
      context: ..
      dockerfile: ./infra/docker/assessiq-api/Dockerfile
    networks: [assessiq-net]
    env_file:
      # required:false lets `docker compose config` succeed in CI / local
      # validation without a populated .env. At runtime on the VPS the .env
      # MUST exist at /srv/assessiq/.env or the API will fail Zod validation
      # in modules/00-core/src/config.ts.
      - path: ../.env
        required: false
    # Operational logs: bind /var/log/assessiq from host so logrotate (system
    # daemon, on host) and pino (in container) share the file inodes. Path
    # MUST match the LOG_DIR env var. See docs/11-observability.md § 7.
    #
    # Skills: bind prompts/skills/ from the repo (relative to this compose
    # file at infra/docker-compose.yml, so ../prompts/skills) read-only into
    # the container at /home/node/.claude/skills. This means `git pull` alone
    # is sufficient to deploy skill changes — no image rebuild needed.
    # skill-sha.ts resolves via os.homedir() = /home/node inside container.
    #
    # claude CLI: bind the host binary read-only. The API container base is
    # node:22-slim (Debian/glibc) so the glibc ELF binary runs correctly.
    # Mount the whole /root/.claude directory rw so the node user can write
    # token refreshes and any new state files Claude CLI creates over time.
    # Container runs as root (USER root in Dockerfile) so it can read
    # /root/.claude/.credentials.json (mode 600). No host chown needed.
    # .claude.json lives one level above the directory — mount separately.
    # The repo's prompts/skills is overlaid ro on top so git-pull-only skill
    # deploys still work and override the host's /root/.claude/skills copy.
    volumes:
      - /var/log/assessiq:/var/log/assessiq
      - /root/.claude:/home/node/.claude:rw
      - /root/.claude.json:/home/node/.claude.json:rw
      - ../prompts/skills:/home/node/.claude/skills:ro
      - /usr/bin/claude:/usr/local/bin/claude:ro
      - /usr/lib/node_modules/@anthropic-ai/claude-code:/usr/lib/node_modules/@anthropic-ai/claude-code:ro
      # assessiq-mcp: stdio MCP server providing submit_anchors / submit_band /
      # submit_questions / submit_rubric tools. Built on the VPS via
      # `cd /srv/assessiq/tools/assessiq-mcp && npm install && npx tsc`.
      # Registered in /root/.claude.json under mcpServers.assessiq with
      # command=node args=["/opt/assessiq-mcp/dist/server.js"]. Without this
      # mount + that registration, claude has no tool to deliver structured
      # output and exits with code 1 (RCA 2026-05-09).
      - ../tools/assessiq-mcp:/opt/assessiq-mcp:ro
    depends_on:
      assessiq-postgres: { condition: service_healthy }
      assessiq-redis: { condition: service_healthy }
    # Host port 9092 is the Caddy split-route target on the shared VPS:
    # `handle /api/* /embed* { reverse_proxy 172.17.0.1:9092 }`. The default
    # route still hits 9091 (frontend placeholder until assessiq-frontend ships).
    # See docs/06-deployment.md § Reverse-proxy plan + § Phase 0 closure.
    ports:
      - "9092:3000"
    expose: ["3000"]
    healthcheck:
      # Use 127.0.0.1 not localhost — node:22-slim resolves `localhost` to ::1
      # (IPv6) first, while Fastify binds 0.0.0.0 (IPv4 only) by default.
      # Node fetch (built-in since Node 18) is used instead of wget because
      # node:22-slim does not include wget (FailingStreak=1589 RCA 2026-05-09).
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      retries: 3

  assessiq-worker:
    <<: *svc-defaults
    image: assessiq/api:${IMAGE_TAG:-latest}
    container_name: assessiq-worker
    # Same image as assessiq-api; second entrypoint runs the BullMQ scheduler.
    # tsx is in the apps/api devDependency closure (carried into the runtime
    # image by the deps stage's tree copy). No separate compile needed —
    # consistent with apps/api which also runs `pnpm exec tsx src/server.ts`.
    command: ["pnpm", "exec", "tsx", "src/worker.ts"]
    networks: [assessiq-net]
    env_file:
      # required:false lets `docker compose config` succeed in CI / local
      # validation without a populated .env. At runtime on the VPS the .env
      # MUST exist at /srv/assessiq/.env or the API will fail Zod validation
      # in modules/00-core/src/config.ts.
      - path: ../.env
        required: false
    # Operational logs: same bind as assessiq-api. Worker logs go to the same
    # JSONL files (stream binding distinguishes per-process emitters).
    # Skills + claude: same binds as assessiq-api (see comment there).
    volumes:
      - /var/log/assessiq:/var/log/assessiq
      - /root/.claude:/home/node/.claude:rw
      - /root/.claude.json:/home/node/.claude.json:rw
      - ../prompts/skills:/home/node/.claude/skills:ro
      - /usr/bin/claude:/usr/local/bin/claude:ro
      - /usr/lib/node_modules/@anthropic-ai/claude-code:/usr/lib/node_modules/@anthropic-ai/claude-code:ro
      # assessiq-mcp: stdio MCP server providing submit_anchors / submit_band /
      # submit_questions / submit_rubric tools. Built on the VPS via
      # `cd /srv/assessiq/tools/assessiq-mcp && npm install && npx tsc`.
      # Registered in /root/.claude.json under mcpServers.assessiq with
      # command=node args=["/opt/assessiq-mcp/dist/server.js"]. Without this
      # mount + that registration, claude has no tool to deliver structured
      # output and exits with code 1 (RCA 2026-05-09).
      - ../tools/assessiq-mcp:/opt/assessiq-mcp:ro
    depends_on:
      assessiq-postgres: { condition: service_healthy }
      assessiq-redis: { condition: service_healthy }
    # No healthcheck — Phase 1 worker is fail-loud (exits non-zero on Redis
    # connect or boot error) and Docker `restart: unless-stopped` covers
    # transient failures. Add a Redis-ping probe in Phase 2 if monitoring
    # signals warrant it.

  assessiq-frontend:
    <<: *svc-defaults
    image: assessiq/frontend:${IMAGE_TAG:-latest}
    container_name: assessiq-frontend
    build:
      context: ..
      dockerfile: ./infra/docker/assessiq-frontend/Dockerfile
    networks: [assessiq-net]
    # Only host port published. ti-platform-caddy-1 (on a different Docker network)
    # reaches this via the bridge gateway 172.17.0.1:9091. No other service
    # publishes a host port — API, worker, postgres, and redis are internal only.
    ports:
      - "9091:80"
    depends_on:
      # service_started (not service_healthy): the frontend is purely static
      # nginx and does not need the API up to start. Caddy splits /api/* to
      # 9092 separately; if the API is down the frontend still serves the SPA
      # shell with whatever fetch failures the SPA's error UI displays.
      assessiq-api: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      retries: 3
      start_period: 5s
