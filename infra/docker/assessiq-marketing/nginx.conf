server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compression for text payloads (HTML/CSS/JS/SVG/XML).
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
  gzip_min_length 1024;

  # Health endpoint — compose healthcheck + ad-hoc curl probes.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Hashed Astro assets (_astro/<name>.<hash>.<ext>) — long-cache immutable.
  # try_files ... =404 keeps a missing asset from being masked by an HTML page.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # robots.txt + sitemaps — short cache so SEO control files refresh quickly.
  # Content types come from nginx mime.types (.xml → application/xml,
  # .txt → text/plain), which is what crawlers expect.
  location = /robots.txt {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
  }
  location ~* ^/sitemap.*\.xml$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
  }

  # Clean-URL static routing for Astro `build.format: 'file'`:
  #   /about  → /about.html        (no trailing-slash 301; matches no-slash canonical)
  #   /        → /index.html        (via the $uri/index.html branch — `index`
  #             directive can't resolve `/` once try_files is present)
  #   unknown → REAL 404           (not a soft-404 SPA shell — correct for SEO)
  # No bare `$uri/` branch, so nginx never serves a directory directly and thus
  # never emits a trailing-slash redirect. Page HTML is unhashed → short cache.
  location / {
    try_files $uri $uri.html $uri/index.html =404;
    expires 5m;
    add_header Cache-Control "public, max-age=300";
  }

  # Astro emits 404.html — serve it WITH a 404 status code (SEO: real 404).
  error_page 404 /404.html;
  location = /404.html { internal; }
}
