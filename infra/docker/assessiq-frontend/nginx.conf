server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compression for text payloads. Static assets are mostly already minified;
  # gzip still helps initial-load HTML/CSS/JS parse cost noticeably.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Health endpoint — used by compose healthcheck and ad-hoc curl probes.
  # access_log off keeps the operational log noise-free.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Hashed asset paths (Vite emits filename.<hash>.ext) — long-cache safe.
  # try_files $uri =404 prevents the SPA fallback from masking a missing asset
  # with index.html (which would surface as a "JS file is HTML" parse error).
  location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|webp|woff2?|ttf|eot|map)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA client-side routing: fall back to index.html for any path that is
  # neither a real file nor a real directory. react-router-dom takes over.
  # index.html itself MUST NOT be cached aggressively — clients need to
  # pick up the new asset hashes after a deploy.
  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires off;
  }
}
