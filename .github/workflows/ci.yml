name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. pnpm setup
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.15"

      # 3. Node setup with pnpm cache
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      # 4. Install dependencies
      # NOTE: using --no-frozen-lockfile until the first stable lockfile is committed.
      # Tighten to --frozen-lockfile once pnpm-lock.yaml is checked in.
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # 5. Type-check all workspaces
      - name: Typecheck
        run: pnpm -r typecheck

      # 6. Lint
      - name: Lint
        run: pnpm lint

      # 7. Test
      - name: Test
        run: pnpm test

      # 8. RLS policy linter
      - name: RLS policy lint
        run: pnpm lint:rls

      # 9. RLS linter self-test (validates the linter itself without real migrations)
      - name: RLS linter self-test
        run: pnpm tsx tools/lint-rls-policies.ts --self-test

      # 9a. No-ambient-Claude lint sentinel — Phase 2 G2.A.
      # LOAD-BEARING per CLAUDE.md § Load-bearing paths: encodes D2 from
      # docs/05-ai-pipeline.md. Modifying the lint file requires codex:rescue.
      # Self-test runs first so a regression in the lint itself surfaces
      # before the actual scan does.
      - name: No-ambient-Claude lint (self-test)
        run: pnpm lint:ambient-ai:self-test

      - name: No-ambient-Claude lint (repo scan)
        run: pnpm lint:ambient-ai

      # 9b. Logging-discipline lint — enforces the convention from
      # docs/11-observability.md § 8 (no console.*, modules use streamLogger,
      # object-form logging, no bare-error args).
      - name: Logging-discipline lint
        run: pnpm tsx tools/lint-logging-discipline.ts

      # 9c. Edge-routing lint — RCA-prevention against /help/* + /take/* fallthrough.
      # Asserts every non-/api/* Fastify route mount is in the canonical Caddy
      # @api matcher in docs/06-deployment.md. See RCA_LOG.md 2026-05-02 + 2026-05-03.
      - name: Edge-routing lint (self-test)
        run: pnpm tsx tools/lint-edge-routing.ts --self-test

      - name: Edge-routing lint (repo scan)
        run: pnpm lint:edge-routing

      # 12. Deploy-procedure lint — 4 checks for ops-vs-code drift.
      # A: skill bind-mount integrity (RCA 2026-05-08 skill-mount incidents)
      # B: migration apply chain (orphaned SQL files not discovered by migrate.ts)
      # C: env var declaration coverage (vars read in code but missing from .env.example)
      # D: email template URL ↔ SPA route (RCA 2026-05-04 /invite/ vs /take/)
      # Self-test runs first so a regression in the lint itself surfaces before
      # the actual scan does.
      - name: Deploy-procedure lint (self-test)
        run: pnpm lint:deploy-procedure:self-test

      - name: Deploy-procedure lint (repo scan)
        run: pnpm lint:deploy-procedure

      # 10. Secrets scan — exact regex set from .claude/hooks/precommit-gate.sh lines 40-51
      # plus the hardcoded-credential-literal pattern. Runs on all files (not just diff)
      # so CI catches anything the precommit hook might have missed.
      - name: Secrets scan
        if: always()
        shell: bash
        run: |
          set +e
          FOUND=0

          patterns=(
            'AKIA[0-9A-Z]{16}'
            'ASIA[0-9A-Z]{16}'
            'sk-[A-Za-z0-9]{20,}'
            'xai-[A-Za-z0-9]{20,}'
            'hf_[A-Za-z0-9]{30,}'
            'github_pat_[A-Za-z0-9_]{20,}'
            'gh[pousr]_[A-Za-z0-9]{20,}'
            'AIza[A-Za-z0-9_-]{30,}'
            'GOCSPX-[A-Za-z0-9_-]{20,}'
            'xox[bp]-[A-Za-z0-9-]{20,}'
          )

          for pat in "${patterns[@]}"; do
            matches=$(grep -rE "$pat" \
              --exclude-dir=node_modules \
              --exclude-dir=.git \
              --exclude-dir=dist \
              --exclude-dir=coverage \
              --exclude='*.lock' \
              . 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "::error::Secrets scan: pattern /$pat/ matched:"
              echo "$matches"
              FOUND=1
            fi
          done

          # Hardcoded credential literal: (password|secret|token|api_key) = "value" or 'value'
          cred_matches=$(grep -rE \
            '(password|secret|token|api_key)[[:space:]]*=[[:space:]]*["'"'"'][^"'"'"']{8,}["'"'"']' \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=dist \
            --exclude-dir=coverage \
            --exclude='*.lock' \
            --exclude='.env.example' \
            . 2>/dev/null || true)
          if [ -n "$cred_matches" ]; then
            echo "::error::Secrets scan: hardcoded credential literal matched:"
            echo "$cred_matches"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo "Secrets scan FAILED — remove or rotate any leaked credentials."
            exit 1
          fi
          echo "Secrets scan: clean"

      # 11. No-Anthropic / no-Claude check
      # Mirrors precommit-gate.sh patterns. We block:
      #   - imports of @anthropic-ai/* or claude-agent-sdk packages (Phase 0 grading-free)
      #   - spawn('claude', ...) / spawn("claude", ...) calls — ambient AI invocations
      #   - hardcoded Anthropic-style API-key literals (sk-ant-*)
      # We do NOT block legitimate references like the AI_PIPELINE_MODE enum values
      # ("claude-code-vps" / "anthropic-api") or the ANTHROPIC_API_KEY env-var name
      # appearing in a Zod schema — those are part of the rule-#1 enforcement itself.
      # Allow list: modules/07-ai-grading/runtimes/anthropic-api.ts (CLAUDE.md rule #2).
      - name: No-Anthropic / no-Claude check
        if: always()
        shell: bash
        run: |
          set +e
          FOUND=0
          ALLOW_PATH='modules/07-ai-grading/runtimes/anthropic-api\.ts'

          patterns=(
            '@anthropic-ai/(claude-agent-sdk|sdk)'
            "from[[:space:]]+[\"']claude-agent-sdk[\"']"
            "require[[:space:]]*\\([[:space:]]*[\"']claude-agent-sdk[\"']"
            "spawn[[:space:]]*\\([[:space:]]*[\"']claude[\"']"
            'sk-ant-[A-Za-z0-9_-]{20,}'
          )

          for pat in "${patterns[@]}"; do
            raw=$(grep -rE "$pat" \
              modules/ packages/ apps/ infra/ tools/ \
              --include='*.ts' \
              --include='*.tsx' \
              --include='*.js' \
              --include='*.jsx' \
              --include='*.json' \
              --include='*.yaml' \
              --include='*.yml' \
              --include='*.sh' \
              --include='*.sql' \
              --exclude-dir=node_modules \
              --exclude-dir=.git \
              --exclude-dir=dist \
              --exclude-dir=coverage \
              2>/dev/null || true)
            filtered=$(echo "$raw" | grep -v -e "$ALLOW_PATH" || true)
            # `grep -v` returns empty string when input is empty; guard for that
            if [ -n "$raw" ] && [ -n "$filtered" ]; then
              echo "::error::No-Anthropic check: pattern /$pat/ matched:"
              echo "$filtered"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "claude/anthropic package imports + spawn('claude') + sk-ant-* literals"
            echo "are forbidden outside modules/07-ai-grading/runtimes/anthropic-api.ts."
            echo "See CLAUDE.md rules #1 and #2."
            exit 1
          fi
          echo "No-Anthropic check: clean"

      # 12. No-TODO grep — parity with precommit gate.
      # Rejects un-tagged TODO|FIXME|XXX. Allows tagged form like TODO(audit),
      # TODO(phase-1), FIXME(rls-helpers) — these encode a stable cross-phase
      # marker that survives merges and is grep-able by tag, not a per-PR
      # reminder. Tag must be lowercase letters/digits/hyphens.
      - name: No-TODO / FIXME / XXX check
        if: always()
        shell: bash
        run: |
          set +e
          matches=$(grep -rP '\b(TODO|FIXME|XXX)\b(?!\([a-z][a-z0-9-]*\))' \
            modules/ packages/ apps/ infra/ tools/ \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=dist \
            --exclude-dir=coverage \
            --exclude='*.md' \
            2>/dev/null || true)

          if [ -n "$matches" ]; then
            echo "::error::Un-tagged TODO/FIXME/XXX markers found in source:"
            echo "$matches"
            echo ""
            echo "Resolve markers before merging, OR re-tag as TODO(<tag>) to mark"
            echo "a stable cross-phase reference (e.g. TODO(audit), TODO(phase-1))."
            exit 1
          fi
          echo "No-TODO check: clean"

      # 13. Cross-module dep declaration lint — RCA prevention for the
      # "import @assessiq/X without declaring X in package.json" class of bugs.
      # Three instances caused prod restart-loops (73ad0b2, 8fff574, 81da5db).
      # See docs/RCA_LOG.md 2026-05-03 § "Missing @assessiq/audit-log dep
      # declarations: recurring pattern (3rd instance), prod restart-loop".
      # Self-test runs first so a regression in the lint surfaces before the scan.
      - name: Cross-module dep lint (self-test)
        run: pnpm tsx tools/lint-cross-module-deps.ts --self-test

      - name: Cross-module dep lint (repo scan)
        run: pnpm lint:cross-module-deps

  # ---------------------------------------------------------------------------
  # E2E job — admin → candidate workflow (Playwright)
  # ---------------------------------------------------------------------------
  # Runs against a configured staging URL. Skipped gracefully when
  # E2E_BASE_URL is not set (no staging env configured yet).
  #
  # To enable: add repo secrets E2E_BASE_URL + E2E_API_BASE_URL pointing at a
  # staging server where ENABLE_E2E_TEST_MINTER=true is set in the server env.
  #
  # NEVER set ENABLE_E2E_TEST_MINTER=true on the production .env.
  # See apps/web/e2e/README.md and docs/06-deployment.md § E2E test minter.
  e2e:
    runs-on: ubuntu-latest
    # Only run if the staging URL secret is configured
    if: vars.E2E_BASE_URL != '' && vars.E2E_BASE_URL != null
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.15"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @assessiq/web exec playwright install --with-deps chromium

      - name: Run E2E spec — admin workflow
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_API_BASE_URL: ${{ vars.E2E_API_BASE_URL }}
        run: pnpm --filter @assessiq/web exec playwright test apps/web/e2e/admin-workflow.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.run_id }}
          path: apps/web/test-results/
          retention-days: 14
